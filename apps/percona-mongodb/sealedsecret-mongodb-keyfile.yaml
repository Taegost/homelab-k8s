# MongoDB internal cluster authentication key.
# Generate a strong random key and base64-encode it:
#   openssl rand -base64 756 | tr -d '\n' | base64 -w0
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mongodb-keyfile
  namespace: mongodb
spec:
  encryptedData:
    mongodb-key: 
  template:
    metadata:
      name: mongodb-keyfile
      namespace: mongodb
    type: Opaque
