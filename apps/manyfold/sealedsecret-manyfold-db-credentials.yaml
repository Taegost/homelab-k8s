---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: manyfold-db-credentials
  namespace: postgres
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      name: manyfold-db-credentials
      namespace: postgres
      labels:
        # Tells CNPG to watch this secret and re-reconcile managed roles
        # whenever it appears or changes. Without this label, CNPG will not
        # retry if the secret didn't exist at initial reconciliation time.
        cnpg.io/reload: "true"
    type: kubernetes.io/basic-auth
