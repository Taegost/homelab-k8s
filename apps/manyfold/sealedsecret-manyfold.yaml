# IMPORTANT: The password sealed here must be identical to the database-password key in
# sealedsecret-manyfold-db-credentials.yaml (postgres namespace). Both secrets carry the same credential
# but serve different consumers in different namespaces:
#   - sealedsecret-manyfold-db-credentials.yaml (postgres ns): CNPG uses it to set the PostgreSQL role password
#   - This secret (manyfold ns): the app pod reads DATABASE_PASSWORD from here
# Kubernetes pods cannot reference secrets across namespaces, so the value must appear in both.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: manyfold
  namespace: manyfold
spec:
  encryptedData:
    database-password: 
    oidc-client-id: 
    oidc-client-secret: 
    secret-key-base: 
    smtp-password: 
  template:
    metadata:
      name: manyfold
      namespace: manyfold
    type: Opaque
