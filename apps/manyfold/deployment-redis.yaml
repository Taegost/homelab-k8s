apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: manyfold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:8.6.2
          # maxmemory: Redis docs say to always set this so Redis manages its own
          # memory pressure rather than being OOM-killed by Kubernetes. Set to
          # ~75% of the K8s memory limit below, leaving headroom for internal
          # buffers (client output buffers, replication buffers, etc.) that are
          # not counted against the dataset but do count against RSS.
          # Ref: https://redis.io/docs/latest/operate/oss_and_stack/management/optimization/memory-optimization/
          #
          # noeviction: the official Redis recommendation for job queues. When
          # full, Redis returns an error on new writes rather than evicting data,
          # preventing silent job loss. For caches, allkeys-lru is recommended
          # instead. Ref: https://redis.io/docs/latest/develop/reference/eviction/
          command:
            - redis-server
            - --maxmemory
            - 96mb
            - --maxmemory-policy
            - noeviction
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 32Mi
            limits:
              # Redis command processing is single-threaded by design — it cannot
              # use more than one core for its main work loop. 500m (half a core)
              # is a reasonable cap; background I/O threads (AOF rewrite, etc.)
              # are negligible for this workload.
              cpu: 500m
              # maxmemory above is set to 96mb (~75% of this limit),
              # giving Redis room to manage its own memory before K8s intervenes.
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            # The official Redis image creates a 'redis' user at UID/GID 999.
            # Setting runAsUser bypasses the gosu privilege-drop in the entrypoint
            # (which requires root) and starts the process directly as the redis
            # user. The entrypoint detects it is not root and skips the chown step,
            # which is safe here because we have no persistence volume to set up.
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL
