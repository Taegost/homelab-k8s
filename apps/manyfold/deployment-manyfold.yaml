apiVersion: apps/v1
kind: Deployment
metadata:
  name: manyfold
  namespace: manyfold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manyfold
  template:
    metadata:
      labels:
        app: manyfold
    spec:
      affinity:
        # Prefer not using a node labeled as "memory-tier=small"
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: memory-tier
                    operator: NotIn
                    values:
                      - small
      containers:
        - name: manyfold
          image: ghcr.io/manyfold3d/manyfold:0.146.0
          ports:
            - containerPort: 3214
          env:
            - name: DATABASE_ADAPTER
              value: postgresql
            # Direct connection to the CNPG primary, bypassing PgBouncer.
            # Manyfold is a Rails app and uses advisory locks during migrations,
            # which are incompatible with PgBouncer's transaction pooling mode.
            - name: DATABASE_HOST
              value: postgres-rw.postgres.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: manyfold
            - name: DATABASE_USER
              value: manyfold
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: database-password
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: secret-key-base
            - name: REDIS_URL
              value: redis://redis.manyfold.svc.cluster.local:6379/1
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: PUBLIC_HOSTNAME
              value: manyfold.diceninjagaming.com
            - name: MULTIUSER
              value: enabled
            - name: FEDERATION
              value: enabled
            - name: HTTPS_ONLY
              value: enabled
            # Manyfold's Postgres connection usage is driven by four concurrency
            # settings, not by the `pool=` parameter in a DATABASE_URL. Worst-case
            # connections = (WEB_CONCURRENCY * RAILS_MAX_THREADS)
            #                + DEFAULT_WORKER_CONCURRENCY + PERFORMANCE_WORKER_CONCURRENCY
            #
            # | Variable                        | Default | What it drives                                   |
            # |---------------------------------|---------|--------------------------------------------------|
            # | WEB_CONCURRENCY                 | 4       | Web worker processes                             |
            # | RAILS_MAX_THREADS               | 16      | Threads per web worker (concurrent requests =    |
            # |                                 |         | WEB_CONCURRENCY x RAILS_MAX_THREADS)             |
            # | DEFAULT_WORKER_CONCURRENCY      | 4       | Standard background job threads — runs during a  |
            # |                                 |         | scan/import of the library                       |
            # | PERFORMANCE_WORKER_CONCURRENCY  | 1       | Heavy job threads — geometric analysis and file  |
            # |                                 |         | conversion, high CPU/memory usage                |
            #
            # Bulk file updates spike DEFAULT_WORKER_CONCURRENCY and
            # PERFORMANCE_WORKER_CONCURRENCY (scanning + thumbnail/geometry generation),
            # on top of whatever web traffic is active — against a shared 100-connection
            # Postgres budget, this adds up fast.
            - name: WEB_CONCURRENCY
              value: "4"
            - name: RAILS_MAX_THREADS
              value: "8"
            - name: DEFAULT_WORKER_CONCURRENCY
              value: "4"
            - name: PERFORMANCE_WORKER_CONCURRENCY
              value: "1"
            # OIDC settings
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: oidc-client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: oidc-client-secret
            - name: OIDC_ISSUER
              value: https://authentik.diceninjagaming.com/application/o/manyfold/
            - name: OIDC_NAME
              value: Authentik
            # E-mail settings
            - name: SMTP_SERVER
              value: smtppro.zoho.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              value: admin@diceninjagaming.com
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: smtp-password
            - name: SMTP_FROM_ADDRESS
              value: admin@diceninjagaming.com
          volumeMounts:
            - name: libraries
              mountPath: /libraries
              # The Unraid share root is Fab-3dPrint; the actual model library
              # lives in a subdirectory called 'libraries'. subPath mounts only
              # that subdirectory, matching the original Docker container layout.
              subPath: libraries
          startupProbe:
            httpGet:
              path: /health
              port: 3214
            # Allow time for migrations and Puma worker startup
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3214
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3214
            periodSeconds: 10
          resources:
            requests:
              # Reflects sustained load (~1 core, ~224MB base RAM)
              cpu: 100m
              memory: 256Mi
            limits:
              # Reflects worst-case: all library scans running simultaneously.
              # Normal operation will be significantly lower.
              cpu: 4000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - SETUID
                - SETGID
      volumes:
        - name: libraries
          persistentVolumeClaim:
            claimName: manyfold-libraries
