apiVersion: apps/v1
kind: Deployment
metadata:
  name: manyfold
  namespace: manyfold
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manyfold
  template:
    metadata:
      labels:
        app: manyfold
    spec:
      affinity:
        # Prefer not using a node labeled as "memory-tier=small"
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: memory-tier
                    operator: NotIn
                    values:
                      - small
      containers:
        - name: manyfold
          image: ghcr.io/manyfold3d/manyfold:0.138.0
          ports:
            - containerPort: 3214
          env:
            - name: DATABASE_ADAPTER
              value: postgresql
            # Direct connection to the CNPG primary, bypassing PgBouncer.
            # Manyfold is a Rails app and uses advisory locks during migrations,
            # which are incompatible with PgBouncer's transaction pooling mode.
            - name: DATABASE_HOST
              value: postgres-rw.postgres.svc.cluster.local
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: manyfold
            - name: DATABASE_USER
              value: manyfold
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: database-password
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: secret-key-base
            - name: REDIS_URL
              value: redis://redis.manyfold.svc.cluster.local:6379/1
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: PUBLIC_HOSTNAME
              value: manyfold.diceninjagaming.com
            - name: MULTIUSER
              value: enabled
            - name: FEDERATION
              value: enabled
            - name: HTTPS_ONLY
              value: enabled
            - name: WEB_CONCURRENCY
              value: "8"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: oidc-client-id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: oidc-client-secret
            - name: OIDC_ISSUER
              value: https://authentik.diceninjagaming.com/application/o/manyfold/
            - name: OIDC_NAME
              value: Authentik
            - name: SMTP_SERVER
              value: smtppro.zoho.com
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              value: admin@diceninjagaming.com
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: manyfold
                  key: smtp-password
            - name: SMTP_FROM_ADDRESS
              value: admin@diceninjagaming.com
          volumeMounts:
            - name: libraries
              mountPath: /libraries
              # The Unraid share root is Fab-3dPrint; the actual model library
              # lives in a subdirectory called 'libraries'. subPath mounts only
              # that subdirectory, matching the original Docker container layout.
              subPath: libraries
          startupProbe:
            httpGet:
              path: /health
              port: 3214
            # Allow time for migrations and Puma worker startup
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3214
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3214
            periodSeconds: 10
          resources:
            requests:
              # Reflects sustained load (~1 core, ~224MB base RAM)
              cpu: 100m
              memory: 256Mi
            limits:
              # Reflects worst-case: all library scans running simultaneously.
              # Normal operation will be significantly lower.
              cpu: 4000m
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - DAC_OVERRIDE
                - SETUID
                - SETGID
      volumes:
        - name: libraries
          persistentVolumeClaim:
            claimName: manyfold-libraries
