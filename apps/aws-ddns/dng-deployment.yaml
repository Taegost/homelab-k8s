apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-ddns-dng
  namespace: aws-ddns
  annotations:
    app.kubernetes.io/source: "https://github.com/Taegost/aws-ddns-docker"
spec:
  # Single replica only — multiple instances would race to update Route53
  # with the same IP, causing unnecessary API calls and potential conflicts.
  replicas: 1
  selector:
    matchLabels:
      app: aws-ddns-dng
  template:
    metadata:
      labels:
        app: aws-ddns-dng
    spec:
      # This container doesn't need any special privileges
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: aws-ddns
          # Source image repo: https://github.com/Taegost/aws-ddns-docker
          # Image is pinned to `latest` intentionally — the application logic rarely
          # changes, but weekly scheduled rebuilds on main pick up base image security
          # patches. If you need to pin to a specific version for stability, use a
          # semver tag (e.g. taegost/aws-ddns:1.0.0) — see the repo for available tags.
          image: taegost/aws-ddns:latest

          # This container doesn't use many resources. At idle it's approximately 60MB RAM and doesn't normally change,
          # and CPU rarely goes above 3% on a 4GHz max clock CPU
          resources:
            requests:
              memory: "60M"
              cpu: "0.01"
            limits:
              memory: "128M"
              cpu: "0.1"
          # This container doesn't need any special privileges and doesn't write anything to disk
          # It also runs as non-root user 1000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          envFrom:
            # Non-sensitive config (DOMAIN and tuning values)
            - configMapRef:
                name: aws-ddns-dng-config
            # Sensitive credentials (AWS_ACCESS_KEY, AWS_SECRET, AWS_ZONE_ID)
            # Source: dng-sealedsecret.yaml — plaintext template in dng-secret.yaml
            - secretRef:
                name: aws-ddns-dng-secret