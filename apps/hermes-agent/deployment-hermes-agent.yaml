apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  namespace: hermes-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: memory-tier
                    operator: NotIn
                    values:
                      - small
      # shareProcessNamespace is NOT set (defaults to false).
      # s6-overlay requires PID 1 to function. When shareProcessNamespace
      # is true, the pause container becomes PID 1, breaking s6-overlay.
      # Since both gateway and dashboard run in the same container under
      # s6-overlay, process namespace sharing is unnecessary.
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        # fsGroup intentionally omitted — the container starts as root
        # and s6-overlay handles user switching. Setting fsGroup would
        # add group-read permissions to ALL mounted volumes, including
        # the SSH client key — OpenSSH rejects group-readable private
        # keys. It also caused /run permission issues that required an
        # emptyDir workaround.
      containers:
        - name: hermes-agent
          image: nousresearch/hermes-agent:v2026.6.19
          args: ["gateway", "run"]
          ports:
            - name: dashboard
              containerPort: 9119
            - name: api
              containerPort: 8642
            - name: webhook
              containerPort: 8644
          env:
            # s6-overlay: allow world-writable /run directory in Kubernetes.
            # Required when running as non-root (UID 10000) because s6-overlay
            # needs a writable /run directory but can't chown it.
            - name: S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES
              value: "1"
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_PUBLIC_URL
              value: "https://hermes.taegost.com"
            - name: HERMES_DASHBOARD_OIDC_ISSUER
              value: "https://authentik.diceninjagaming.com/application/o/hermes-agent/"
            - name: HERMES_DASHBOARD_OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: hermes-agent
                  key: oidc-client-id
            # Note: HERMES_DASHBOARD_OIDC_ISSUER does NOT need a Client Secret
            # because Hermes uses PKCE (authorization-code + PKCE), not a
            # confidential client flow. Only the Client ID is needed.
            #
            # offline_access is required for Authentik to issue refresh tokens.
            # Without it, the dashboard's access token expires after 15 minutes
            # and the user is forced to re-authenticate. With it, the Hermes
            # dashboard silently re-authenticates via the refresh_token grant.
            # Authentik 2024.2+ requires offline_access to be explicitly
            # requested — it is not included in the default scopes.
            - name: HERMES_DASHBOARD_OIDC_SCOPES
              value: "openid profile email offline_access"
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agent
                  key: api-server-key
            - name: WEBHOOK_ENABLED
              value: "true"
            - name: WEBHOOK_PORT
              value: "8644"
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: hermes-agent
                  key: webhook-secret
            # ── Model / LiteLLM Backend ──────────────────────────────────────
            # Points Hermes at the existing LiteLLM instance. The model name
            # is set post-deployment via `hermes model` — these vars just
            # configure the provider endpoint.
            - name: OPENAI_BASE_URL
              value: "https://litellm.diceninjagaming.com/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agent
                  key: litellm-api-key
          securityContext:
            # The hermes-agent image is designed to run as UID 10000 (hermes).
            # s6-overlay handles initialization and privilege dropping.
            # S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES=1 allows
            # s6-overlay to boot with a world-writable /run directory.
            runAsUser: 10000
            runAsGroup: 10000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: run
              mountPath: /run
            - name: data
              mountPath: /opt/data
            - name: ssh-client-key
              mountPath: /opt/data/.ssh/id_ed25519
              subPath: id_ed25519
              readOnly: true
            - name: known-hosts
              mountPath: /opt/data/.ssh/known_hosts
              subPath: known_hosts
              readOnly: true
            - name: ssh-config
              mountPath: /opt/data/.ssh/config
              subPath: config
              readOnly: true
          startupProbe:
            httpGet:
              path: /health
              port: 9119
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9119
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9119
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              cpu: 2000m
              memory: 4Gi
      volumes:
        - name: run
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: ssh-client-key
          secret:
            secretName: hermes-agent-ssh-agent-keys
            items:
              - key: id_ed25519
                path: id_ed25519
            defaultMode: 0400
        - name: known-hosts
          configMap:
            name: hermes-agent-known-hosts
        - name: ssh-config
          configMap:
            name: hermes-agent-ssh-config
