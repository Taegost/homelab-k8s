# Honcho API key for Hermes memory integration.
#
# This must be a JWT token signed with Honcho's AUTH_JWT_SECRET (HS256).
# See apps/honcho/README.md for the full generation steps and commands.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hermes-honcho-api-key
  namespace: hermes-agent
spec:
  encryptedData:
    honcho-api-key: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: hermes-honcho-api-key
      namespace: hermes-agent
    type: Opaque
