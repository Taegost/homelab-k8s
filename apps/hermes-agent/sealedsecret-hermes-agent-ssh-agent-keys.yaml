# SSH agent keypair — hermes-agent authenticates to sandbox
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hermes-agent-ssh-agent-keys
  namespace: hermes-agent
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    id_ed25519: 
    id_ed25519.pub: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: hermes-agent-ssh-agent-keys
      namespace: hermes-agent
    type: Opaque
