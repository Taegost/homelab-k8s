# SSH sandbox host keypair — sandbox sshd identity
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hermes-agent-ssh-sandbox-keys
  namespace: hermes-agent
spec:
  encryptedData:
    ssh_host_ed25519_key: 
    ssh_host_ed25519_key.pub: 
  template:
    metadata:
      name: hermes-agent-ssh-sandbox-keys
      namespace: hermes-agent
    type: Opaque
