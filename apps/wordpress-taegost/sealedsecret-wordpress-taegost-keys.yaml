# SealedSecret — wordpress-taegost-keys (plaintext template)
#
# WordPress authentication keys and salts. Must be identical across all replicas —
# each pod generates random values at startup if env vars are absent, causing
# cross-pod cookie validation failures.
#
# Generate fresh values from https://api.wordpress.org/secret-key/1.1/salt/
# Extract only the value portion (everything between the quotes after "define(...)").
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-taegost-keys
  namespace: wordpress-taegost
spec:
  encryptedData:
    WORDPRESS_AUTH_KEY: 
    WORDPRESS_AUTH_SALT: 
    WORDPRESS_LOGGED_IN_KEY: 
    WORDPRESS_LOGGED_IN_SALT: 
    WORDPRESS_NONCE_KEY: 
    WORDPRESS_NONCE_SALT: 
    WORDPRESS_SECURE_AUTH_KEY: 
    WORDPRESS_SECURE_AUTH_SALT: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: wordpress-taegost-keys
      namespace: wordpress-taegost
    type: Opaque
