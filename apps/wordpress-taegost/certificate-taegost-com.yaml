# Certificate — taegost.com
#
# Issues a dedicated certificate for the root domain.
# The secret lands in the wordpress-taegost namespace for direct reference by IngressRoute.
#
# STAGING ISSUER ACTIVE — test with staging first.
# After kubectl get certificate taegost-com -n wordpress-taegost shows Ready=True,
# switch issuerRef.name to letsencrypt-taegost-prod and commit.
# See docs/plans/2026-05-22-002-feat-wordpress-taegost-plan.md for prod switchover procedure.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: taegost-com
  namespace: wordpress-taegost
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  secretName: taegost-com-tls
  issuerRef:
    name: letsencrypt-taegost-prod
    kind: ClusterIssuer
  dnsNames:
    - taegost.com
