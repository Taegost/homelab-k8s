# SealedSecret — wordpress-taegost (plaintext template)
#
# Database credentials for the wordpress-taegost deployment (app-namespace copy).
# Must match the password in secret-wordpress-taegost-db-credentials.yaml exactly —
# the mariadb-namespace copy is for the MariaDB User CRD; this copy is for the pod.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-taegost
  namespace: wordpress-taegost
spec:
  encryptedData:
    WORDPRESS_DB_PASSWORD: 
    WORDPRESS_DB_USER: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "0"
      name: wordpress-taegost
      namespace: wordpress-taegost
    type: Opaque
