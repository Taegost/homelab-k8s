# IngressRoute — wordpress-taegost
#
# Routes traffic for taegost.com to the WordPress service.
# Uses a dedicated per-app certificate (not the wildcard).
#

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wordpress-taegost
  namespace: wordpress-taegost
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`taegost.com`)
      kind: Rule
      services:
        - name: wordpress-taegost
          port: 80
      middlewares:
        - name: default-headers
          namespace: traefik
    - match: Host(`taegost.com`) && PathPrefix(`/wp-admin`)
      kind: Rule
      services:
        - name: wordpress-taegost
          port: 80
      middlewares:
        - name: default-whitelist
          namespace: traefik
  tls:
    secretName: taegost-com-tls
