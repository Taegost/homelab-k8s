# Certificate — n8n.home.diceninjagaming.com
#
# Per-app cert for the external webhook IngressRoute (ingressroute-n8n-webhooks.yaml).
# Lives in the n8n namespace alongside that IngressRoute so Traefik can resolve
# the TLS secret without cross-namespace access.
#
# The internal UI IngressRoute (ingressroute-n8n.yaml, traefik namespace) uses the
# shared wildcard cert and does not need its own certificate.
#
# If n8n is ever made fully public, promote the webhook IngressRoute to cover
# the full host and drop the internal IngressRoute + whitelist — this cert
# already covers the entire hostname.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: n8n-home-diceninjagaming-com
  namespace: n8n
spec:
  secretName: n8n-home-diceninjagaming-com-tls
  duration: 2160h
  renewBefore: 720h
  dnsNames:
    - n8n.home.diceninjagaming.com
  issuerRef:
    name: letsencrypt-diceninjagaming-prod
    kind: ClusterIssuer
    group: cert-manager.io
