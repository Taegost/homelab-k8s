# Root credentials for the shared MariaDB cluster (sealed with kubeseal).
#
# root-password: the MariaDB root superuser password, used by mariadb-operator
#   to bootstrap the cluster and for ongoing administration tasks.
#
# repl-password: the password for the internal replication user the operator
#   creates to stream changes from the primary to the replica. Must be DIFFERENT
#   from root-password — the operator uses two separate accounts and identical
#   passwords can mask a misconfiguration that would only surface under failover.
#
# To rotate: recreate secret-mariadb-root.yaml with new values and re-seal.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mariadb-root
  namespace: mariadb
spec:
  encryptedData:
    repl-password: 
    root-password: 
  template:
    metadata:
      name: mariadb-root
      namespace: mariadb
    type: Opaque
