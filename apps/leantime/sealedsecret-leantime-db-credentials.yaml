# MariaDB credentials for the leantime user — namespace: mariadb
# The mariadb-operator User CRD reads this secret to set the database user password.
# This password must also appear in the leantime-namespace secret (secret-leantime.yaml)
# so the pod can connect. Keep both values in sync when rotating.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: leantime-db-credentials
  namespace: mariadb
spec:
  encryptedData:
    password: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-2"
      name: leantime-db-credentials
      namespace: mariadb
    type: Opaque
