# Leantime app-namespace secret — namespace: leantime
#
# Contains credentials for the Leantime pod. The database-password here
# must match the value in secret-leantime-db-credentials.yaml (mariadb
# namespace) — keep them in sync when rotating.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: leantime
  namespace: leantime
spec:
  encryptedData:
    database-password: 
    oidc-client-id: 
    oidc-client-secret: 
    session-password: 
    smtp-password: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: leantime
      namespace: leantime
    type: Opaque
