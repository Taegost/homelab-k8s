# ExternalName services with raw IP addresses work here because Traefik reads
# externalName directly from the Kubernetes API, bypassing CoreDNS entirely.
# Standard in-cluster DNS cannot resolve an IP as an ExternalName — this is a
# Traefik-specific capability. See apps/traefik/external/README.md for full details.
apiVersion: v1
kind: Service
metadata:
  name: gamepanel
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.50
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gamepanel
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gamepanel.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: gamepanel
          port: 8080
  tls:
    secretName: wildcard-diceninjagaming-com-tls
