# ExternalName services with raw IP addresses work here because Traefik reads
# externalName directly from the Kubernetes API, bypassing CoreDNS entirely.
# Standard in-cluster DNS cannot resolve an IP as an ExternalName — this is a
# Traefik-specific capability. See apps/traefik/external/README.md for full details.
apiVersion: v1
kind: Service
metadata:
  name: homeassistant
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.40
  ports:
    - port: 8123
      targetPort: 8123
---
# hass.home.diceninjagaming.com — external-facing alias
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homeassistant-hass
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`hass.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: homeassistant
          port: 8123
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
---
# homeassistant.home.diceninjagaming.com — internal alias
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homeassistant-internal
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`homeassistant.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: homeassistant
          port: 8123
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
