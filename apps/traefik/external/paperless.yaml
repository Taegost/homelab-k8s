# ExternalName services with raw IP addresses work here because Traefik reads
# externalName directly from the Kubernetes API, bypassing CoreDNS entirely.
# Standard in-cluster DNS cannot resolve an IP as an ExternalName — this is a
# Traefik-specific capability. See apps/traefik/external/README.md for full details.
apiVersion: v1
kind: Service
metadata:
  name: paperless
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.9
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: paperless
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`paperless.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: paperless
          port: 8000
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
