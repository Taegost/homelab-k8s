# ExternalName services with raw IP addresses work here because Traefik reads
# externalName directly from the Kubernetes API, bypassing CoreDNS entirely.
# Standard in-cluster DNS cannot resolve an IP as an ExternalName — this is a
# Traefik-specific capability. See external/README.md for full details.
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.251
  ports:
    - port: 9000
      targetPort: 9000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authentik
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`authentik.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: authentik
          port: 9000
  tls:
    secretName: wildcard-diceninjagaming-com-tls
