apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: traefik
spec:
  ports:
    - port: 9443
      protocol: TCP
      targetPort: 9443
---
apiVersion: v1
kind: Endpoints
metadata:
  name: portainer
  namespace: traefik
subsets:
  - addresses:
      - ip: 192.168.5.12
    ports:
      - port: 9443
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: portainer
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`portainer.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: portainer
          port: 9443
          scheme: https
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
