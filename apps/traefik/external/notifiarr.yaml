apiVersion: v1
kind: Service
metadata:
  name: notifiarr
  namespace: traefik
spec:
  ports:
    - port: 5454
      protocol: TCP
      targetPort: 5454
---
apiVersion: v1
kind: Endpoints
metadata:
  name: notifiarr
  namespace: traefik
subsets:
  - addresses:
      - ip: 192.168.5.12
    ports:
      - port: 5454
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: notifiarr
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`notifiarr.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: notifiarr
          port: 5454
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
