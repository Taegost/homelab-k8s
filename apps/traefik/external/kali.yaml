apiVersion: v1
kind: Service
metadata:
  name: kali
  namespace: traefik
spec:
  ports:
    - port: 8006
      protocol: TCP
      targetPort: 8006
---
apiVersion: v1
kind: Endpoints
metadata:
  name: kali
  namespace: traefik
subsets:
  - addresses:
      - ip: 192.168.5.5
    ports:
      - port: 8006
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kali
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`kali.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: kali
          port: 8006
          scheme: https
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
