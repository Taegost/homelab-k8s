apiVersion: v1
kind: Service
metadata:
  name: qbt
  namespace: traefik
spec:
  ports:
    - port: 1337
      protocol: TCP
      targetPort: 1337
---
apiVersion: v1
kind: Endpoints
metadata:
  name: qbt
  namespace: traefik
subsets:
  - addresses:
      - ip: 192.168.5.9
    ports:
      - port: 1337
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: qbt
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`qbt.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: qbt
          port: 1337
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
