# ExternalName services with raw IP addresses work here because Traefik reads
# externalName directly from the Kubernetes API, bypassing CoreDNS entirely.
# Standard in-cluster DNS cannot resolve an IP as an ExternalName — this is a
# Traefik-specific capability. See external/README.md for full details.
apiVersion: v1
kind: Service
metadata:
  name: patchpanda
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.12
  ports:
    - port: 5093
      targetPort: 5093
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: patchpanda
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`patchpanda.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: patchpanda
          port: 5093
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
