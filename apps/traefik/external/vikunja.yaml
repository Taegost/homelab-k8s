# ExternalName services with raw IP addresses work here because Traefik reads
# externalName directly from the Kubernetes API, bypassing CoreDNS entirely.
# Standard in-cluster DNS cannot resolve an IP as an ExternalName — this is a
# Traefik-specific capability. See apps/traefik/external/README.md for full details.
apiVersion: v1
kind: Service
metadata:
  name: vikunja
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.12
  ports:
    - port: 3456
      targetPort: 3456
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: vikunja
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`vikunja.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-headers
          namespace: traefik
      services:
        - name: vikunja
          port: 3456
  tls:
    secretName: wildcard-diceninjagaming-com-tls
