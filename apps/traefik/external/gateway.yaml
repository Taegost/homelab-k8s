apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: traefik
spec:
  ports:
    - port: 80
      protocol: TCP
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: gateway
  namespace: traefik
subsets:
  - addresses:
      - ip: 192.168.5.1
    ports:
      - port: 80
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: gateway
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`gateway.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: gateway
          port: 80
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
