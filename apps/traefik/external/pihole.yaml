# ExternalName services with raw IP addresses work here because Traefik reads
# externalName directly from the Kubernetes API, bypassing CoreDNS entirely.
# Standard in-cluster DNS cannot resolve an IP as an ExternalName — this is a
# Traefik-specific capability. See external/README.md for full details.
apiVersion: v1
kind: Service
metadata:
  name: pihole-primary
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.247
  ports:
    - port: 413
      targetPort: 413
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-primary
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pihole.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: pihole-primary
          port: 413
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
---
apiVersion: v1
kind: Service
metadata:
  name: pihole-secondary
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.248
  ports:
    - port: 413
      targetPort: 413
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-secondary
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`pihole-secondary.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: pihole-secondary
          port: 413
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
