# ExternalName services with raw IP addresses work here because Traefik reads
# externalName directly from the Kubernetes API, bypassing CoreDNS entirely.
# Standard in-cluster DNS cannot resolve an IP as an ExternalName — this is a
# Traefik-specific capability. See external/README.md for full details.
apiVersion: v1
kind: Service
metadata:
  name: manyfold
  namespace: traefik
spec:
  type: ExternalName
  externalName: 192.168.5.60
  ports:
    - port: 3214
      targetPort: 3214
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: manyfold
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`manyfold.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: manyfold
          port: 3214
  tls:
    secretName: wildcard-diceninjagaming-com-tls
