apiVersion: v1
kind: Service
metadata:
  name: n8n
  namespace: traefik
spec:
  ports:
    - port: 5678
      protocol: TCP
      targetPort: 5678
---
apiVersion: v1
kind: Endpoints
metadata:
  name: n8n
  namespace: traefik
subsets:
  - addresses:
      - ip: 192.168.5.12
    ports:
      - port: 5678
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: n8n
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`n8n.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: n8n
          port: 5678
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
