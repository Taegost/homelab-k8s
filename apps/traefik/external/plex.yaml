apiVersion: v1
kind: Service
metadata:
  name: plex
  namespace: traefik
spec:
  ports:
    - port: 32400
      protocol: TCP
      targetPort: 32400
---
apiVersion: v1
kind: Endpoints
metadata:
  name: plex
  namespace: traefik
subsets:
  - addresses:
      - ip: 192.168.5.12
    ports:
      - port: 32400
        protocol: TCP
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: plex
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`plex.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-whitelist
          namespace: traefik
      services:
        - name: plex
          port: 32400
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
