# Certificate — *.home.diceninjagaming.com
#
# Issues the wildcard certificate for all services on the home subdomain.
# The secret lands in the traefik namespace so IngressRoute resources in
# this namespace can reference it directly without cross-namespace lookups.
#
# This certificate covers any service exposed at *.home.diceninjagaming.com
# that uses the shared wildcard rather than a per-app explicit certificate.
#
# For per-app explicit certificates (e.g. publicly exposed services), define
# a Certificate resource in the app's own namespace alongside its IngressRoute.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-home-diceninjagaming-com
  namespace: traefik
spec:
  secretName: wildcard-home-diceninjagaming-com-tls
  duration: 2160h      # 90 days — Let's Encrypt standard
  renewBefore: 720h    # Renew 30 days before expiry
  dnsNames:
    - "*.home.diceninjagaming.com"
  issuerRef:
    name: letsencrypt-diceninjagaming-prod
    kind: ClusterIssuer
    group: cert-manager.io