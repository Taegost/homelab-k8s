# Middleware — default-headers
#
# Security headers applied to all standard web traffic routes.
# Reference this middleware in any IngressRoute that serves web content.
#
# Header explanations:
#   frameDeny / customFrameOptionsValue: prevents clickjacking by blocking
#     the page from being embedded in an iframe on another domain.
#   browserXssFilter: enables the browser's built-in XSS protection.
#   contentTypeNosniff: prevents browsers from MIME-sniffing the response,
#     reducing the risk of drive-by downloads.
#   forceSTSHeader / stsSeconds / stsIncludeSubdomains / stsPreload:
#     enforces HTTPS via HSTS for 180 days, including all subdomains.
#     stsPreload indicates this domain can be submitted to browser HSTS
#     preload lists for extra protection.
#   X-Forwarded-Proto: tells backend services the original request was HTTPS,
#     preventing them from generating incorrect HTTP redirect URLs.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: default-headers
  namespace: traefik
spec:
  headers:
    frameDeny: true
    browserXssFilter: true
    contentTypeNosniff: true
    forceSTSHeader: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 15552000
    customFrameOptionsValue: SAMEORIGIN
    customRequestHeaders:
      X-Forwarded-Proto: https