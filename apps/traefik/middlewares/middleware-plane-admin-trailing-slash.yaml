# Middleware — god-mode trailing slash redirect
#
# This is a redirect middleware, not an IngressRoute — does not need
# default-whitelist (applied separately on the admin IngressRoute).
#
# Plane admin React Router has basename="/god-mode/" but the "Get Started"
# button links to /god-mode without trailing slash. React Router fails to
# match because "/god-mode" does not start with "/god-mode/".
#
# This middleware adds the trailing slash before the request reaches the
# admin pod. Fix tracked upstream: https://github.com/makeplane/plane/pull/9070
#
# Usage: Add to the god-mode route in the Plane IngressRoute.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: plane-admin-trailing-slash
  namespace: traefik
spec:
  redirectRegex:
    regex: "^/god-mode$"
    replacement: "/god-mode/"
    permanent: true
