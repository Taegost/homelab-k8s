# Dashboard BasicAuth — SealedSecret
#
# Contains the htpasswd-formatted credentials for the Traefik dashboard.
# Generated by sealing dashboard-auth-secret.yaml with kubeseal.
#
# To generate:
#   1. Create the htpasswd hash: htpasswd -nb YOUR_USERNAME YOUR_PASSWORD
#   2. Fill in dashboard-auth-secret.yaml with the output
#   3. Run: kubeseal --format yaml < apps/traefik/dashboard-auth-secret.yaml > apps/traefik/dashboard-auth-sealedsecret.yaml
#   4. Delete dashboard-auth-secret.yaml
#
# TODO: Replace BasicAuth with Authentik forward auth once Authentik is
# deployed. See middleware-authentik.yaml (to be added during migration).
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: dashboard-auth
  namespace: traefik
spec:
  encryptedData:
    users: 
  template:
    metadata:
      name: dashboard-auth
      namespace: traefik
    type: Opaque