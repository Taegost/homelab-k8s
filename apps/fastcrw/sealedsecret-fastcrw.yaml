# SealedSecret — fastCRW
#
# Keys:
#   CHROME_WS_URL — Full Browserless v2 websocket URL including token
#     Format: ws://chrome-stealth.fastcrw.svc.cluster.local:3000/chromium?token=YOUR_TOKEN_HERE&stealth=true
#   API_KEYS — Comma-separated fastCRW API keys for the [auth] section
#     Format: fc-key-1234,fc-key-5678 (generate your own)
#   BROWSERLESS_TOKEN — Token for Browserless v2 websocket auth
#     Must match the token embedded in CHROME_WS_URL
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: fastcrw
  namespace: fastcrw
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    API_KEYS: 
    BROWSERLESS_TOKEN: 
    CHROME_WS_URL: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: fastcrw
      namespace: fastcrw
    type: Opaque
