---
# ConfigMap — librechat-config
#
# Non-sensitive LibreChat configuration as librechat.yaml. Mounted at
# /app/librechat.yaml in the Deployment. LibreChat reads this file at
# startup only — after editing, run:
#   kubectl rollout restart deployment/librechat -n librechat
#
# Sensitive values (API keys, JWT secrets, MONGO_URI, etc.) live in
# sealedsecret-librechat.yaml and are injected as env vars.
#
# Schema version 1.3.9 for LibreChat v0.8.5.
# See https://github.com/danny-avila/LibreChat/blob/main/librechat.example.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-config
  namespace: librechat
data:
  librechat.yaml: |
    version: "1.3.9"
    cache: true
    interface:
      modelSelect: true
      parameters: true
      presets: true
      prompts: true
      bookmarks: true
      multiConvo: true
      agents: true
    registration:
      socialLogins: []
      allowedDomains: []
    endpoints:
      custom:
        - name: "LiteLLM"
          apiKey: "${LITELLM_API_KEY}"
          baseURL: "http://litellm.litellm.svc.cluster.local:4000/v1"
          models:
            default: ["deepseek/deepseek-v4-flash"]
            fetch: true
          type: "openai"
