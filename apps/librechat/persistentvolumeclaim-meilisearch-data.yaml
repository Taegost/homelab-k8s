apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: meilisearch-data
  namespace: librechat
  labels:
    app: meilisearch
    app.kubernetes.io/part-of: librechat
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      # 2Gi covers tens of thousands of chat messages with years of headroom.
      # Official benchmark: 19K docs = 224MB on-disk LMDB. Homelab messages
      # produce sub-1Gi indexes. This PVC is a cache — rebuildable from MongoDB.
      storage: 2Gi
