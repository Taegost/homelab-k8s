# Database credentials for LibreChat RAG API — lives in the librechat namespace.
# The RAG API Deployment references this Secret for the DB_PASSWORD env var.
#
# WARNING: This SealedSecret must be regenerated after filling in the real
# password in secret-librechat-rag-api-db-credentials.yaml. Run:
#   kubeseal --format yaml < apps/librechat/secret-librechat-rag-api-db-credentials.yaml \
#     > apps/librechat/sealedsecret-librechat-rag-api-db-credentials.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: librechat-rag-api-db-credentials
  namespace: librechat
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  encryptedData:
    # TODO: replace with actual kubeseal output (must use the SAME password
    # as sealedsecret-librechat-rag-db-credentials.yaml)
    password: 
    username: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-3"
      name: librechat-rag-api-db-credentials
      namespace: librechat
    type: Opaque
