---
# SealedSecret — librechat-db-credentials
#
# MongoDB credentials for LibreChat. Deployed to the mongodb namespace.
# The password value here must match the MONGO_URI password in
# sealedsecret-librechat.yaml (librechat namespace) — both decrypted
# Secrets must have identical values.
#
# After filling in the real password in secret-librechat-db-credentials.yaml:
#   kubeseal --format yaml < apps/librechat/secret-librechat-db-credentials.yaml > apps/librechat/sealedsecret-librechat-db-credentials.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: librechat-db-credentials
  namespace: mongodb
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  encryptedData:
    password: AgA_replaced_by_running_kubeseal_
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-3"
      name: librechat-db-credentials
      namespace: mongodb
    type: Opaque
