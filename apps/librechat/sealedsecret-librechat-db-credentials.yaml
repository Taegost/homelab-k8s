# MongoDB password for LibreChat
#
# WARNING: This password must match the MONGO_URI password in
# apps/librechat/secret-librechat.yaml (librechat namespace). Both secrets
# must have identical values — see docs/mongodb-runbooks.md for rotation
# ordering (update librechat-namespace secret first, then mongodb-namespace
# secret, then restart LibreChat).
#
# Fill in a strong alphanumeric password (no special characters to avoid
# URL-encoding issues in MONGO_URI), then seal:
#   kubeseal --format yaml < apps/librechat/secret-librechat-db-credentials.yaml > apps/librechat/sealedsecret-librechat-db-credentials.yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: librechat-db-credentials
  namespace: mongodb
spec:
  encryptedData:
    password: 
  template:
    metadata:
      name: librechat-db-credentials
      namespace: mongodb
    type: Opaque
