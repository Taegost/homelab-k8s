---
# SealedSecret — librechat
#
# LibreChat application secrets. Contains credentials only — non-sensitive
# config (DOMAIN_CLIENT, DOMAIN_SERVER, HOST, PORT, TRUST_PROXY, MEILI_HOST,
# REDIS_URI, RAG_API_URL) is set directly in the Deployment env.
#
# MONGO_URI is the full MongoDB connection string (including embedded password):
#   mongodb://librechat:<password>@mongodb-rs0.mongodb.svc.cluster.local:27017/LibreChat?authSource=LibreChat&maxPoolSize=20
# Takes a single URI because LibreChat has no separate MONGO_HOST / MONGO_USER / MONGO_PASSWORD env vars.
#
# The MONGO_URI password here must match the password in
# sealedsecret-librechat-db-credentials.yaml (mongodb namespace).
#
# After filling in real values in secret-librechat.yaml:
#   kubeseal --format yaml < apps/librechat/secret-librechat.yaml > apps/librechat/sealedsecret-librechat.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: librechat
  namespace: librechat
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    MONGO_URI: AgA_replaced_by_running_kubeseal_
    MEILI_MASTER_KEY: AgA_replaced_by_running_kubeseal_
    JWT_SECRET: AgA_replaced_by_running_kubeseal_
    JWT_REFRESH_SECRET: AgA_replaced_by_running_kubeseal_
    CREDS_KEY: AgA_replaced_by_running_kubeseal_
    CREDS_IV: AgA_replaced_by_running_kubeseal_
    OPENAI_API_KEY: AgA_replaced_by_running_kubeseal_
    ANTHROPIC_API_KEY: AgA_replaced_by_running_kubeseal_
    LITELLM_API_KEY: AgA_replaced_by_running_kubeseal_
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: librechat
      namespace: librechat
    type: Opaque
