# SealedSecret — librechat
#
# LibreChat application secrets. Contains credentials only — non-sensitive
# config (DOMAIN_CLIENT, DOMAIN_SERVER, HOST, PORT, TRUST_PROXY, MEILI_HOST,
# REDIS_URI, RAG_API_URL) is set directly in the Deployment env.
#
# MONGO_URI is the full MongoDB connection string (including embedded password):
#   mongodb://librechat:<password>@mongodb-rs0.mongodb.svc.cluster.local:27017/LibreChat?authSource=LibreChat&maxPoolSize=20
# Takes a single URI because LibreChat has no separate MONGO_HOST / MONGO_USER / MONGO_PASSWORD env vars.
#
# The MONGO_URI password here must match the password in
# sealedsecret-librechat-db-credentials.yaml (mongodb namespace).
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: librechat
  namespace: librechat
spec:
  encryptedData:
    CREDS_IV: 
    CREDS_KEY: 
    DEEPSEEK_API_KEY: 
    JWT_REFRESH_SECRET: 
    JWT_SECRET: 
    LITELLM_API_KEY: 
    MEILI_MASTER_KEY: 
    MONGO_URI: 
    rag-password: 
    rag-username: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: librechat
      namespace: librechat
    type: Opaque
