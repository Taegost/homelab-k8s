# Database credentials for LibreChat RAG — lives in the postgres namespace.
# CNPG uses this to set the role password for librechat_rag.
#
# PASSWORD MUST MATCH: the password in secret-librechat-rag-api-db-credentials.yaml
# (librechat namespace) must be identical. Kubernetes pods cannot reference secrets
# across namespaces, so the password must appear in both places.
#
# Fill in a strong password, then seal:
#   kubeseal --format yaml < apps/librechat/secret-librechat-rag-db-credentials.yaml > apps/librechat/sealedsecret-librechat-rag-db-credentials.yaml

---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
  name: librechat-rag-db-credentials
  namespace: postgres
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-3"
      labels:
        cnpg.io/reload: "true"
      name: librechat-rag-db-credentials
      namespace: postgres
    type: kubernetes.io/basic-auth
