# Database credentials for LibreChat RAG — lives in the postgres namespace.
# CNPG uses this to set the role password.
#
# WARNING: This SealedSecret must be regenerated after filling in the real
# password in secret-librechat-rag-db-credentials.yaml. Run:
#   kubeseal --format yaml < apps/librechat/secret-librechat-rag-db-credentials.yaml \
#     > apps/librechat/sealedsecret-librechat-rag-db-credentials.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: librechat-rag-db-credentials
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  encryptedData:
    # TODO: replace with actual kubeseal output
    password: 
    username: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-3"
      labels:
        cnpg.io/reload: "true"
      name: librechat-rag-db-credentials
      namespace: postgres
    type: kubernetes.io/basic-auth
