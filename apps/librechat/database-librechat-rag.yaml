# CNPG Database CRD — creates the librechat_rag database and assigns
# librechat_rag as owner. The role is declared in
# apps/postgres/cluster-postgres.yaml under spec.managed.roles.
# After this syncs, run the pgvector extension init step:
#   PRIMARY=$(kubectl get pod -n postgres -l cnpg.io/instanceRole=primary \
#     -o jsonpath='{.items[0].metadata.name}')
#   kubectl exec -n postgres "$PRIMARY" -- psql -U postgres -d librechat_rag \
#     -c "CREATE EXTENSION IF NOT EXISTS vector;"
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: librechat-rag
  namespace: postgres
spec:
  name: librechat_rag
  owner: librechat_rag
  cluster:
    name: postgres
