# PersistentVolume — backups-nfs
#
# Cluster-scoped NFS PersistentVolume pointing at the Unraid backup share.
# This PV is the single source of truth for the NFS endpoint — all namespaces
# that need backup access create their own PVC that binds to this PV by name,
# rather than each declaring their own NFS connection details.
#
# NFS server: firebird.lan (Unraid server)
# Export path: /mnt/user/Backups
# Each application writes to its own subdirectory under the mount root.
# Subdirectory creation is handled by the application itself, not Kubernetes.
#
# Adding a new namespace that needs backup access:
#   Create a PVC in that namespace with:
#     storageClassName: nfs-static
#     volumeName: backups-nfs
#   No changes to this file are needed.
#
# Why storageClassName: nfs-static (not ""):
#   nfs-static is a named StorageClass for all statically provisioned NFS PVs
#   in this cluster. See apps/infrastructure/storage/storageclass-nfs-static.yaml
#   for the rationale. An empty string was avoided because with multiple NFS PVs
#   planned, explicit naming prevents accidental cross-binding.
#
# Why volumeName is required in PVCs:
#   storageClassName: nfs-static alone is not enough to guarantee this PV is
#   chosen — Kubernetes could bind a PVC to any nfs-static PV that satisfies
#   the accessMode and capacity. The volumeName field in each PVC pins the
#   binding deterministically. This is mandatory for all nfs-static PVCs.
#
# Why capacity: 1Ti:
#   The capacity field is required by the Kubernetes API and cannot be omitted.
#   It is also used as a binding filter — a PVC will only bind to a PV whose
#   capacity >= the PVC's request. The value does NOT enforce a limit at the
#   NFS level; Unraid enforces actual storage limits on the share itself.
#   1Ti is set to reflect the realistic upper bound of the Unraid share.
#   If the PVC requests more than 1Ti, binding will fail — keep PVC requests
#   at or below this value.
#
# Why Retain:
#   If a PVC is deleted, Kubernetes leaves the NFS data untouched. Manual
#   cleanup is required, but for a backup destination that is always the
#   right behavior — accidental PVC deletion should never destroy backups.
#
# Why ReadWriteMany:
#   Multiple pods across arr-stack (and other namespaces in future) need
#   to write to this share simultaneously. NFS natively supports concurrent
#   access, so ReadWriteMany is correct here.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: backups-nfs
  # PersistentVolumes are cluster-scoped — no namespace field
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-static
  nfs:
    server: firebird.lan
    path: /mnt/user/Backups
    # readOnly: false is the default but stated explicitly for clarity —
    # apps need write access to create backup files.
    readOnly: false