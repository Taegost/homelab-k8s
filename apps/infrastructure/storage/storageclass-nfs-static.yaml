# StorageClass — nfs-static
#
# A named StorageClass for all statically provisioned NFS PersistentVolumes
# in this cluster. Using a named class instead of storageClassName: "" (empty)
# prevents accidental cross-binding between unrelated PVs and PVCs while still
# making clear that no dynamic provisioner is involved.
#
# Why `provisioner: kubernetes.io/no-provisioner`:
#   This StorageClass does not provision volumes dynamically. PVs must be
#   created manually (i.e. defined in this repo). A PVC using this class will
#   only bind to an existing PV — it will not trigger Longhorn or any other
#   provisioner to create storage automatically.
#
# Why not just use storageClassName: "" (empty string):
#   An empty storageClassName makes a PV eligible to bind to any PVC that
#   also has an empty storageClassName, regardless of intent. With 5+ NFS PVs
#   on the horizon (backups, multimedia, fab-3dprint, diceninjagaming,
#   hostshared), relying on empty strings and hoping volumeName bindings
#   prevent mismatches is fragile. A named class makes intent explicit and
#   keeps all static NFS volumes visually grouped.
#
# volumeBindingMode: Immediate means PVs are available for binding as soon
# as they are created. WaitForFirstConsumer is only needed for topology-aware
# provisioners (e.g. local-path, Longhorn) — NFS is accessible from all nodes
# so immediate binding is correct.
#
# Adding a new static NFS PV:
#   Set storageClassName: nfs-static in the PV spec.
#   Set storageClassName: nfs-static and volumeName: <pv-name> in the PVC spec.
#   The explicit volumeName is still required to guarantee deterministic binding
#   when multiple nfs-static PVs exist.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-static
provisioner: kubernetes.io/no-provisioner
volumeBindingMode: Immediate
# reclaimPolicy here is the default for PVs that reference this StorageClass
# but do not set their own reclaimPolicy. All NFS PVs in this cluster set
# Retain explicitly, so this is a safety net rather than the active policy.
reclaimPolicy: Retain