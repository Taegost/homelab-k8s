# StorageClass — nfs-backups
#
# Dynamic NFS provisioner for application backup volumes.
# Backed by the Unraid Backups share via the NFS CSI driver.
#
# NFS server: firebird.lan
# NFS export: /mnt/user/Backups
#
# How provisioning works:
#   When a PVC references this StorageClass, the CSI driver automatically
#   creates a subdirectory on the NFS share and provisions a PV bound to
#   that PVC. No manual PV creation is needed.
#
# subDir pattern: ${pvc.metadata.namespace}/${pvc.metadata.name}
#   Each PVC gets its own isolated subdirectory. On Unraid you will see:
#     /mnt/user/Backups/arr-stack/neutarr-backups/
#     /mnt/user/Backups/arr-stack/sonarr-backups/
#   This makes it easy to identify which cluster resource owns which directory.
#
# Why reclaimPolicy: Retain:
#   When a PVC is deleted (including accidental ArgoCD prune), the NFS
#   subdirectory and its data are NOT deleted. Manual cleanup on Unraid is
#   required to remove the data. For backup storage this is always the right
#   behavior — automated deletion of backup data would be catastrophic.
#   Note: the provisioned PV moves to Released state and must be manually
#   deleted before the storage can be reclaimed by Kubernetes.
#
# Why volumeBindingMode: Immediate:
#   NFS is accessible from all nodes simultaneously, so there is no need
#   to wait for a pod to be scheduled before binding the PV. Immediate
#   binding is correct for network-attached storage.
#
# Usage — create a PVC per application that needs backup storage:
#   apiVersion: v1
#   kind: PersistentVolumeClaim
#   metadata:
#     name: <app-name>-backups       # becomes the subdirectory name on Unraid
#     namespace: <app-namespace>     # becomes the parent directory on Unraid
#   spec:
#     accessModes:
#       - ReadWriteMany
#     storageClassName: nfs-backups
#     resources:
#       requests:
#         storage: 10Gi              # not enforced at NFS level — Unraid controls actual limits
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-backups
provisioner: nfs.csi.k8s.io
parameters:
  server: firebird.lan
  share: /mnt/user/Backups
  # Creates namespace/pvcname subdirectory structure on the NFS share.
  # Example: arr-stack/neutarr-backups/
  subDir: ${pvc.metadata.namespace}/${pvc.metadata.name}
reclaimPolicy: Retain
volumeBindingMode: Immediate
mountOptions:
  # nfsvers=4.1: Use NFSv4.1 for better performance and reliability over NFSv3.
  # Unraid supports NFSv4 — confirm the share is exported with NFSv4 enabled
  # if mount failures occur, fall back to nfsvers=3.
  - nfsvers=4.1