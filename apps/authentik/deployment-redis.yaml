apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: docker.io/library/redis:7-alpine
          # noeviction: correct policy for a Celery task queue — Redis returns
          # an error on new writes when full rather than silently evicting jobs.
          command:
            - redis-server
            - --maxmemory
            - 96mb
            - --maxmemory-policy
            - noeviction
          ports:
            - containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            # runAsUser bypasses the entrypoint's gosu privilege-drop (which
            # requires root). The entrypoint detects it is already the redis
            # user and skips the chown step, so ALL capabilities can be dropped.
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL
