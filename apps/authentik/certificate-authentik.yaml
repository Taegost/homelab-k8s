apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authentik-diceninjagaming-com
  namespace: authentik
spec:
  secretName: authentik-diceninjagaming-com-tls
  duration: 2160h
  renewBefore: 720h
  dnsNames:
    - authentik.diceninjagaming.com
  issuerRef:
    name: letsencrypt-diceninjagaming-prod
    kind: ClusterIssuer
    group: cert-manager.io
