# IngressRoute — ArgoCD UI
#
# Exposes the ArgoCD UI at argocd.home.diceninjagaming.com.
#
# ArgoCD is configured to run in insecure mode (no TLS on the ArgoCD server
# itself) because TLS is terminated by Traefik. This is the recommended
# approach when running behind an ingress controller.
#
# Authentication: ArgoCD has its own built-in auth (admin user + local users).
# TODO: Replace with Authentik SSO once Authentik is deployed.
#
# The backend service port is 80 (not 443) because ArgoCD server runs in
# insecure mode — see the argocd-cmd-params-cm ConfigMap in install.yaml
# which is patched via argocd-app.yaml.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`argocd.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: secured
          namespace: traefik
      services:
        - name: argocd-server
          namespace: argocd
          port: 80
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls