# ArgoCD server credentials and configuration secrets.
# This SealedSecret is unsealed by the sealed-secrets controller into a Secret
# resource named 'argocd-secret' in the 'argocd' namespace.
#
# Keys included:
#   - admin.password: ArgoCD admin user password (bcrypt hashed)
#   - admin.passwordMtime: Timestamp of last password change (RFC3339 format)
#   - server.secretkey: Server session signing key
#   - tls.crt/tls.key: TLS certificate and private key for ArgoCD server
#   - webhook.github.secret: GitHub webhook secret for repo event notifications
#
# IMPORTANT: This secret is sealed for the 'argocd' namespace and cannot be
# decrypted in any other namespace. To update, modify the plaintext secret-argocd-secret.yaml
# (gitignored), then run:
#   kubeseal --format=yaml < secret-argocd-secret.yaml > sealedsecret-argocd-secret.yaml
#
# Related files:
#   - apps/argocd/argocd.yaml: Contains the Secret definition this unseals into
#   - apps/sealed-secrets/sealed-secrets-controller.yaml: Controller that unseals this
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argocd-secret
  namespace: argocd
spec:
  encryptedData:
    admin.password: 
    admin.passwordMtime: 
    server.secretkey: 
    tls.crt: 
    tls.key: 
    webhook.github.secret: 
  template:
    metadata:
      name: argocd-secret
      namespace: argocd
    type: Opaque
