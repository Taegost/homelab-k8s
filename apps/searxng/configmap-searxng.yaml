# ConfigMap to create settings.yml
# Documentation: https://docs.searxng.org/admin/settings/settings.html
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: searxng
data:
  settings.yml: |
    # SearXNG Configuration
    # Uses the default settings as the base
    use_default_settings: true
    general:
      debug: false
      enable_metrics: true
      # Proxy image results through SearXNG.
      image_proxy: true
      instance_name: "SearXNG"
      # POST queries are "more secure" but are also the source of hard-to-locate
      # annoyances, which is why GET may be better for end users and their browsers.
      # see https://github.com/searxng/searxng/pull/3619
      method: "GET"
      open_metrics: os.environ/OPEN_METRICS_PASSWORD
    search:
      # Set the search bar autocomplete
      autocomplete: google
      # Autodetects the users default language
      default_lang: "auto"
      # remove format to deny access, use lower case.
      # formats: [html, csv, json, rss]
      formats:
        - html
        - json
      # Available languages
      languages:
        - en
        - es
      # If engine supports paging, 0 means unlimited numbers of pages. 
      # The value is only applied if the engine itself does not have a max value that is lower than this one.
      max_page: 0
      # Filter results. 0: None, 1: Moderate, 2: Strict
      safe_search: 0
    server:
      base_url: https://searxng.diceninjagaming.com
      bind_address: "0.0.0.0"
      port: 8080
      # Enable features designed only for public instances
      public_instance: false
      secret_key: os.environ/SECRET_KEY
    ui:
      # URL prefix of the internet archive or cache, don’t forget trailing slash (if needed)
      cache_url: https://web.archive.org/web/
      # Open results in a new tab by default
      results_on_new_tab: true
      # Perform search immediately if a category selected.
      # Disable to select multiple categories at once and start the search manually.
      search_on_category_select: true
      static_use_hash: true
      theme_args:
        # Style of simple theme: auto, light, dark, black
        simple_style: dark
