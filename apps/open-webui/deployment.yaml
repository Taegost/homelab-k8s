apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      # Reduces the amount of old ReplicaSets that stick around after a redeployment
      revisionHistoryLimit: 1
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: open-webui
          # Pin to specific version — update as needed.
          image: ghcr.io/open-webui/open-webui:v0.9.5
          ports:
            - containerPort: 8080
          env:
            # Set the log level for the application
            - name: GLOBAL_LOG_LEVEL
              value: INFO
            # ── Backend Configuration ─────────────────────────────────────────
            # *** If you define an OpenAI URL, it will take precedence over anything
            # *** entered in the Admin Panel in the UI. After a restart, any manually
            # *** added connections will be lost. That is why we aren't defining it here.

            # Custom name for the UI (optional).
            - name: WEBUI_NAME
              value: "Dice Ninja Gaming AI"
            # Limit concurrent sessions per user to prevent abuse.
            - name: SESSION_LIMIT
              value: "10"
            # Enables the creation of API keys by users
            - name: ENABLE_API_KEYS
              value: "True"

            # ── Database ───────────────────────────────────────────────────────
            # Full Postgres connection string. Uses postgres-rw (direct connection)
            # for simplicity — Open WebUI doesn't need PgBouncer's connection
            # pooling since it maintains relatively few persistent connections.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: open-webui
                  key: database-url

            # ── Session Security ───────────────────────────────────────────────
            # Random session secret for Open WebUI's internal sessions.
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: open-webui
                  key: webui-secret-key

            # ── OIDC/Authentik SSO ──────────────────────────────────────────────
            # Open WebUI has built-in OIDC support. Configure Authentik as the
            # provider in Authentik first, then fill in the values below.
            # See apps/open-webui/README.md for setup instructions.
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: open-webui
                  key: oidc-client-id
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: open-webui
                  key: oidc-client-secret
            - name: OPENID_PROVIDER_URL
              value: "https://authentik.diceninjagaming.com/application/o/open-webui/.well-known/openid-configuration"
            # OPENID_REDIRECT_URI must match the Redirect URI registered in Authentik.
            - name: OPENID_REDIRECT_URI
              value: "https://open-webui.diceninjagaming.com/oauth/oidc/callback"
            # WEBUI_URL is required for OAuth — must be set before first login.
            - name: WEBUI_URL
              value: "https://open-webui.diceninjagaming.com"
            # Auto-create accounts for any authenticated user.
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            # Immediately redirect to Authentik for login (no intermediate page).
            - name: OAUTH_AUTO_REDIRECT_TO_OAUTH_PROVIDER
              value: "true"
            - name: OAUTH_PROVIDER_NAME
              value: "Authentik"
            # Enable role sync from OIDC token groups claim.
            - name: ENABLE_OAUTH_ROLE_MANAGEMENT
              value: "true"
            # Matches the claim name returned by the Authentik property mapping.
            - name: OAUTH_ROLES_CLAIM
              value: "groups"
            - name: OAUTH_ADMIN_ROLES
              value: "Open-WebUI Admin"
            - name: OAUTH_ALLOWED_ROLES
              value: "Open-WebUI User"

          securityContext:
            # Image defaults to root (UID/GID are build-time ARGs defaulting to 0).
            # All files in /app are owned by root at build time — overriding
            # runAsUser at runtime causes write failures on /app/backend/open_webui/static
            # and other paths the app needs to modify. Run as root; limit blast
            # radius via no_new_privs and capability drops instead.
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              cpu: 1000m
              memory: 2000Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: open-webui-data