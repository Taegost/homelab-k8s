# App-level secrets for Open WebUI — lives in the open-webui namespace.
#
# Before sealing, fill in ALL placeholder values:
#   - database-url  : Full Postgres connection string. The password must match
#                     the value in secret-open-webui-db-credentials.yaml in the
#                     postgres namespace (Kubernetes pods cannot reference secrets
#                     across namespaces, so the password must appear in both).
#                     Format: postgresql://open_webui:PASSWORD@postgres-pooler.postgres.svc.cluster.local:5432/open_webui
#   - litellm-api-key  : Open WebUI uses this to authenticate to LiteLLM's API
#   - webui-secret-key: random 32-byte value (openssl rand -hex 32)
#   - oidc-client-id: from Authentik OAuth2/OIDC application
#   - oidc-client-secret: from Authentik OAuth2/OIDC application
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: open-webui
  namespace: open-webui
spec:
  encryptedData:
    database-url: 
    litellm-api-key: 
    oidc-client-id: 
    oidc-client-secret: 
    webui-secret-key: 
  template:
    metadata:
      name: open-webui
      namespace: open-webui
    type: Opaque
