# Database credentials for Open WebUI — lives in the postgres namespace.
# CNPG uses this to set the role password.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: open-webui-db-credentials
  namespace: postgres
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-2"
      labels:
        cnpg.io/reload: "true"
      name: open-webui-db-credentials
      namespace: postgres
    type: kubernetes.io/basic-auth
