# ArgoCD Application — Infrastructure
#
# Manages cluster-wide infrastructure resources that don't belong to any
# specific application or namespace. This is intentionally kept as a single
# ArgoCD Application rather than splitting by subcategory — the folder
# structure under apps/infrastructure/ provides organization, and a single
# sync unit is simpler to reason about at homelab scale.
#
# When to split this into multiple Applications:
#   - If a subcategory grows large enough to need independent sync control
#   - If a resource in one subcategory is blocking syncs for unrelated resources
#
# Subdirectory structure under apps/infrastructure/:
#   storage/    — StorageClasses for NFS shares (cluster-scoped)
#   networking/ — cluster-wide NetworkPolicies, etc. (empty, reserved for future use)
#
# Note: The NFS CSI driver itself is managed by apps/manifests/nfs-csi.yaml,
# not here. This Application manages only the StorageClasses that depend on
# the driver — keeping driver installation and StorageClass declaration
# as separate concerns with independent sync control.
#
# Sync wave -1: Runs alongside nfs-csi (wave -1) and Traefik (wave -1).
# StorageClasses must exist before arr-stack (wave 0) creates PVCs against them.
# The nfs-csi driver must also be running before those PVCs are created —
# sync wave ordering across Applications is not strictly guaranteed, but since
# both are wave -1 and the CSI driver starts quickly, this is reliable in practice.
# If ordering issues occur, move infrastructure to wave 0 and accept that the
# first sync of arr-stack may require a manual retry.
#
# Adding a new infrastructure resource:
#   Drop a manifest file into the appropriate subdirectory under apps/infrastructure/.
#   With recurse: true, ArgoCD picks it up automatically on next sync.
#   No changes to this file are needed.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infrastructure
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://github.com/Taegost/homelab-k8s
    targetRevision: HEAD
    path: apps/infrastructure
    directory:
      # Recurse into subdirectories so new resource categories are picked up
      # automatically without updating this manifest.
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    # StorageClasses are cluster-scoped (no namespace), but ArgoCD requires a
    # destination namespace. default is used as a conventional placeholder —
    # it has no effect on where cluster-scoped resources are created.
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true