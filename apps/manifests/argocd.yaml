# ArgoCD Application — ArgoCD (self-management)
#
# Manages the ArgoCD installation itself — the install manifest, IngressRoute,
# and ConfigMap in this directory. Changes committed to apps/argocd/ are
# applied by ArgoCD automatically.
#
# This Application is discovered by the root app-of-apps (app-of-apps.yaml
# at the repo root) and does not need to be applied manually after bootstrap.
#
# ── Version Management ────────────────────────────────────────────────────────
# ArgoCD is installed via a raw manifest rather than a Helm chart, so the
# version cannot be pinned in a targetRevision field. Instead, the version is
# frozen in the committed apps/argocd/argocd.yaml file itself.
#
# Current version: v3.3.7 (non-HA)
#
# To upgrade:
#   1. Download the new manifest:
#      ARGOCD_VERSION="vX.Y.Z"
#      curl -sL https://raw.githubusercontent.com/argoproj/argo-cd/${ARGOCD_VERSION}/manifests/install.yaml \
#        -o apps/argocd/argocd.yaml
#   2. Update the version number in this comment block
#   3. Commit and push — ArgoCD will apply the update to itself automatically
#
#   No other edits to argocd.yaml are needed. The two-source layout below
#   ensures customisations in apps/argocd/ (e.g. argocd-cmd-params-cm.yaml)
#   always override whatever the upstream install manifest ships with, because
#   ArgoCD applies sources in order and the last source wins on conflicts.
#
# This version management pattern applies to all manifest-based installs in
# this repo (i.e. any app not installed via a Helm chart).
# ─────────────────────────────────────────────────────────────────────────────
#
# ── HA vs non-HA ─────────────────────────────────────────────────────────────
# Currently using the non-HA manifest (install.yaml) because the cluster has
# only 2 nodes. The HA manifest requires a minimum of 3 nodes due to Redis HA
# quorum requirements — running it on fewer nodes leaves pods permanently pending.
#
# When the third node is added, switch to the HA manifest by replacing
# apps/argocd/argocd.yaml with the HA version and pushing to Git. ArgoCD will
# apply the change to itself automatically. See docs/argocd-ha-migration.md
# for full instructions.
# ─────────────────────────────────────────────────────────────────────────────
#

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
spec:
  project: default
  sources:
    # The sources are laid out this way explicitly because the install manifest contains
    # ConfigMaps that conflict with one we've created, and whichever is applied last wins.
    # This pattern intends to defeat that by forcing it to sync the install manifest before
    # anything else.
    - repoURL: https://github.com/Taegost/homelab-k8s
      targetRevision: HEAD
      path: apps/argocd
      directory:
        include: 'argocd.yaml'
    - repoURL: https://github.com/Taegost/homelab-k8s
      targetRevision: HEAD
      path: apps/argocd
      directory:
        exclude: 'argocd.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true