# ArgoCD Application — Traefik
#
# After bootstrap, ArgoCD takes over management of Traefik using this
# manifest. It points at the Helm chart with the same values.yaml used
# during bootstrap, ensuring the configuration stays consistent.
#
# Sync wave -1: Traefik must be running before any IngressRoute resources
# created by other applications can be served. It runs after cert-manager
# (wave -2) and MetalLB (wave -2) are both ready.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  sources:
    # Source 1: The Traefik Helm chart
    - repoURL: https://traefik.github.io/charts
      chart: traefik
      targetRevision: 39.0.8
      helm:
        valueFiles:
          - $values/apps/traefik/values.yaml
    # Source 2: This repo, used only as a $values reference for the Helm
    # chart above. The ref: values makes it available as $values variable.
    - repoURL: https://github.com/Taegost/homelab-k8s
      targetRevision: HEAD
      ref: values
    # Source 3: This repo, providing all supporting manifests in apps/traefik/
    # (middlewares, IngressRoutes, TLSStore, certificates, etc.)
    # Excludes values.yaml since that is consumed by Source 1 via $values,
    # not applied directly as a manifest.
    - repoURL: https://github.com/Taegost/homelab-k8s
      targetRevision: HEAD
      path: apps/traefik
      directory:
        exclude: 'values.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true