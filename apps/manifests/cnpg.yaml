# ArgoCD Application — CloudNativePG Operator
#
# Installs the CloudNativePG (CNPG) operator, which manages PostgreSQL clusters
# as Kubernetes-native CRDs. All Cluster, Pooler, Database, Role, and Backup
# resources depend on the CRDs this operator installs.
#
# Sync wave -2: Runs alongside cert-manager and MetalLB — all three are
# cluster operators that install CRDs and enable higher-level resources.
# Must be fully ready before the postgres Application (wave -1) attempts
# to create any CNPG CRD resources.
#
# ServerSideApply is required: CNPG CRDs contain fields that exceed the
# kubectl annotation size limit under client-side apply, same as cert-manager.
#
# To upgrade the operator: update targetRevision in Source 1 and verify
# the changelog for any CRD migrations at https://cloudnative-pg.io/docs/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  sources:
    # Source 1: The CloudNativePG Helm chart
    - repoURL: https://cloudnative-pg.github.io/charts
      chart: cloudnative-pg
      targetRevision: 0.22.0
      helm:
        valueFiles:
          - $values/apps/cnpg/values.yaml
    # Source 2: This repo, used only as a $values reference for the Helm
    # chart above.
    - repoURL: https://github.com/Taegost/homelab-k8s
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
