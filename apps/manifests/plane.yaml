# ArgoCD Application — Plane
#
# Plane CE project management / kanban platform. Deployed in its own namespace
# with a shared PostgreSQL database (CNPG cluster, postgres namespace),
# in-namespace Valkey, RabbitMQ, and MinIO for app infrastructure.
#
# The app directory contains resources in two namespaces:
#   plane namespace     — Deployments, Services, PVCs, IngressRoute (traefik ns),
#                         ConfigMap, app-level Secret
#   postgres namespace  — Database CRD, db-credentials Secret
#
# Sync wave 0: depends on Traefik (wave -1) for IngressRoutes, CNPG (wave 0)
# for the Database CRD, and Longhorn for PVC provisioning.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Taegost/homelab-k8s
    targetRevision: HEAD
    path: apps/plane
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: plane
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
