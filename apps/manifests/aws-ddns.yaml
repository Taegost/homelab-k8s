apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aws-ddns
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Taegost/homelab-k8s
    targetRevision: HEAD
    path: apps/aws-ddns
  destination:
    server: https://kubernetes.default.svc
    namespace: aws-ddns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true