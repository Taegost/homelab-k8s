# ArgoCD Application — Sealed Secrets
#
# After bootstrap, ArgoCD uses this manifest to take over management of the
# Sealed Secrets controller. It points at this directory, so ArgoCD will
# reconcile sealed-secrets-controller.yaml going forward — meaning if someone
# accidentally deletes or modifies the controller, ArgoCD will restore it.
#
# To upgrade Sealed Secrets:
#   1. Replace sealed-secrets-controller.yaml with the new release manifest
#   2. Update the version comment in that file
#   3. Commit and push — ArgoCD will apply the update automatically
#
# Sync wave -3: must be running before any other app applies a SealedSecret
# resource. Lowest wave number in the stack = deploys first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    # Points at this directory in the repo. ArgoCD will apply all YAML files
    # it finds here — currently just sealed-secrets-controller.yaml.
    repoURL: https://github.com/Taegost/homelab-k8s
    targetRevision: HEAD
    path: apps/sealed-secrets
  destination:
    server: https://kubernetes.default.svc
    # Resources in the manifest define their own namespace (kube-system),
    # so this destination namespace is a fallback only — it won't override
    # the namespace declared in each resource.
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false