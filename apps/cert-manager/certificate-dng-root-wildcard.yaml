# Certificate — *.diceninjagaming.com
#
# Requests a wildcard certificate covering all subdomains of
# diceninjagaming.com. This covers any services exposed directly on the
# root domain (e.g. public-facing services not under the home. subdomain).
#
# Note: This certificate covers *.diceninjagaming.com but NOT
# diceninjagaming.com itself (the bare root domain). If you need the bare
# root domain covered, add "diceninjagaming.com" to dnsNames — this will
# trigger two separate DNS-01 challenges but both are handled automatically.
#
# See certificate-home.yaml for testing workflow instructions.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-diceninjagaming-com
  namespace: cert-manager
spec:
  secretName: wildcard-diceninjagaming-com-tls
  duration: 2160h
  renewBefore: 720h
  dnsNames:
    - "*.diceninjagaming.com"
  issuerRef:
    # Start with staging, switch to letsencrypt-prod once verified
    name: letsencrypt-diceninjagaming-prod
    kind: ClusterIssuer
    group: cert-manager.io