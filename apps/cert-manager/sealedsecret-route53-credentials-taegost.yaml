# Route53 credentials — taegost.com
#
# AWS IAM credentials for the taegost.com Route53 hosted zone.
# Used by letsencrypt-taegost-staging and letsencrypt-taegost-prod ClusterIssuers
# to complete DNS-01 challenges.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: route53-credentials-taegost
  namespace: cert-manager
spec:
  encryptedData:
    access-key-id: 
    secret-access-key: 
  template:
    metadata:
      name: route53-credentials-taegost
      namespace: cert-manager
    type: Opaque
