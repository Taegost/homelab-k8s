# PersistentVolumeClaim — bazarr-multimedia
#
# NFS-backed mount of the full Multimedia share on Unraid, provisioned by the
# nfs-multimedia StorageClass. Bazarr needs read/write access to place
# subtitle files alongside media files in the library.
#
# Unlike nfs-backups, this StorageClass has no subDir — the PV maps directly
# to the share root (/mnt/user/Multimedia on Unraid), giving Bazarr access
# to the entire library hierarchy.
#
# Storage request is not enforced by NFS — set to a placeholder value to
# satisfy the Kubernetes API.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bazarr-multimedia
  namespace: arr-stack
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-multimedia
  resources:
    requests:
      storage: 10Ti
