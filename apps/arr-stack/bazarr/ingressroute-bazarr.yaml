# IngressRoute — bazarr (in traefik namespace)
#
# Lives in the `traefik` namespace because it references the wildcard TLS
# secret, which cannot be shared across namespaces.
#
# Two routes on the same host:
#   /api/ — internal-whitelist only (no Authentik). Allows Sonarr, Radarr,
#            and other arr-stack services to call the Bazarr API without
#            going through SSO. Also reachable from outside Kubernetes on
#            the local subnet.
#   /     — secured + authentik for full SSO protection on the UI.
#
# Traefik picks the more specific rule (/api/ prefix) automatically —
# no explicit priority needed.
#
# Backend service: bazarr.arr-stack.svc.cluster.local:6767
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: bazarr
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`bazarr.home.diceninjagaming.com`) && PathPrefix(`/api/`)
      kind: Rule
      middlewares:
        - name: secured
          namespace: traefik
      services:
        - name: bazarr
          namespace: arr-stack
          port: 6767
    - match: Host(`bazarr.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: secured
          namespace: traefik
        - name: authentik
          namespace: traefik
      services:
        - name: bazarr
          namespace: arr-stack
          port: 6767
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
