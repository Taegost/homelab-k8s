# Service — radarr
#
# ClusterIP service exposing Radarr's web UI and API port within the cluster.
# Traefik routes external traffic here via the IngressRoute in the traefik
# namespace. Prowlarr and other arr-stack services reach Radarr directly at
# radarr.arr-stack.svc.cluster.local:7878.
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: arr-stack
spec:
  selector:
    app: radarr
  ports:
    - name: http
      port: 7878
      targetPort: 7878
  type: ClusterIP
