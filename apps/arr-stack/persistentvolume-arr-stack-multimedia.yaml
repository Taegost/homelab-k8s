# PersistentVolume — arr-stack-multimedia
#
# Static PV giving the arr-stack namespace read/write access to the root of
# the Unraid Multimedia SMB share. All four arr-stack apps that handle media
# files (Bazarr, Radarr, Sonarr, Whisparr) mount this through the single
# shared PVC defined in persistentvolumeclaim-multimedia.yaml.
#
# Why static provisioning (not a StorageClass):
#   The SMB CSI dynamic provisioner always creates a per-PVC subdirectory,
#   even without a subDir parameter — it uses the PV UUID as the directory
#   name. The arr-stack apps need the share root directly so they can find
#   existing library content organised by Jellyfin/Plex/etc. Static
#   provisioning lets us bind directly to //firebird.lan/Multimedia without
#   any subdirectory being created.
#
# Why SMB instead of NFS:
#   NFS hard mounts with Unraid's Mover cause stale file handle errors when
#   files shift between cache and array disks (the file inode changes and the
#   NFS client gets confused). The noserverino mount option tells the SMB
#   client to generate its own inodes rather than trusting the server's, which
#   completely eliminates the problem.
#
# Credentials:
#   A Secret named "smb-creds" must exist in the kube-system namespace.
#   See storageclass-smb-backups.yaml for creation instructions.
#
# reclaimPolicy: Retain:
#   If this PV or the bound PVC is deleted, the SMB share and its data are
#   untouched. The PV moves to Released state and must be manually deleted
#   before it can be reused.
#
# capacity: 100Ti is a nominal ceiling — SMB does not enforce quotas at the
#   PV level. Actual capacity is whatever Unraid reports for the share.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: arr-stack-multimedia
spec:
  capacity:
    storage: 100Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    # noserverino: client generates its own inodes rather than using the
    # server's. This is the key fix for stale file handle errors when Unraid's
    # Mover migrates files between SSD cache and the parity array.
    - noserverino
    - _netdev
  csi:
    driver: smb.csi.k8s.io
    volumeHandle: arr-stack-multimedia
    volumeAttributes:
      source: //firebird.lan./Multimedia
    nodeStageSecretRef:
      name: smb-creds
      namespace: kube-system
  claimRef:
    namespace: arr-stack
    name: multimedia
