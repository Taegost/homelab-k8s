# IngressRoute — seerr
#
# Lives in the `arr-stack` namespace (not traefik) because it uses a per-app
# TLS certificate. Traefik resolves tls.secretName in the same namespace as
# the IngressRoute, so the cert and route must be co-located.
#
# Both hostnames are covered by the SAN cert in certificate-seerr.yaml:
#   seerr.home.diceninjagaming.com     — new canonical name
#   jellyseerr.home.diceninjagaming.com — legacy name, kept for continuity
#
# Auth: Seerr handles its own authentication via OIDC (preview-new-oidc
# branch). Only default-headers is applied — no whitelist, no Authentik
# forward-auth, as this route is publicly accessible.
#
# Backend service: seerr.arr-stack.svc.cluster.local:5055
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seerr
  namespace: arr-stack
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`seerr.home.diceninjagaming.com`) || Host(`jellyseerr.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: default-headers
          namespace: traefik
      services:
        - name: seerr
          namespace: arr-stack
          port: 5055
  tls:
    secretName: seerr-home-diceninjagaming-com-tls
