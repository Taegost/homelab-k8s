# Deployment — NeutArr
#
# NeutArr is an automated missing media hunter and quality upgrader for *arr apps.
# GitHub: https://github.com/I-am-PUID-0/NeutArr
#
# Runs as a single replica — NeutArr is a background automation tool, not a
# user-facing service. If the pod restarts, *arr hunts resume on the next
# scheduled cycle with no user impact.
#
# Access is gated by the Traefik basic-auth middleware defined in
# apps/traefik/middleware-basic-auth.yaml.
# TODO: When Authentik is deployed:
#   1. Replace the basic-auth middleware on ingressroute-neutarr.yaml with
#      the Authentik forward-auth middleware
#   2. Remove NEUTARR_AUTH_MODE env var (or set to `standard`) so NeutArr's
#      own auth is re-enabled as a second factor
#
# Volumes:
#   /config  — Longhorn PVC (neutarr-config): NeutArr application state,
#              API keys, app connections, search schedules. NeutArr-specific.
#   /backups — NFS PVC (neutarr-backups): dynamically provisioned on the
#              Unraid Backups share via nfs-backups StorageClass. NeutArr
#              writes backup files here. Data lives at:
#              /mnt/user/Backups/arr-stack/neutarr-backups/ on Unraid.
#
# Image versioning: always pin to a specific tag, never `latest`.
# To upgrade:
#   1. Update the image tag below
#   2. Update the version comment in apps/manifests/arr-stack.yaml
#   3. Commit and push — ArgoCD applies the new image automatically
#

apiVersion: apps/v1
kind: Deployment
metadata:
  name: neutarr
  namespace: arr-stack
  labels:
    app: neutarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neutarr
  template:
    metadata:
      labels:
        app: neutarr
    spec:
      # Do not mount a service account token — NeutArr does not interact
      # with the Kubernetes API and has no need for cluster credentials.
      automountServiceAccountToken: false
      securityContext:
        # RuntimeDefault seccomp profile restricts available syscalls to a
        # safe subset without requiring a custom profile. Supported by k3s.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neutarr
          image: iampuid0/neutarr:1.6.1
          securityContext:
            # Prevent the container from gaining additional privileges beyond
            # what it starts with. Defense in depth against privilege escalation.
            allowPrivilegeEscalation: false
            capabilities:
              # Drop NET_RAW specifically — it enables raw socket access which
              # NeutArr does not need and which is a common attack vector.
              # Drop ALL is more thorough but may break the container entrypoint
              # that repairs /config ownership at startup (requires some caps).
              # Revisit dropping ALL once the container's startup behavior is
              # confirmed under restricted capabilities.
              drop:
                - NET_RAW
          ports:
            - containerPort: 9705
              name: http
          # TODO: Tune resource limits after profiling
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "750Mi"
          env:
            # PUID/PGID: The container entrypoint repairs /config ownership at
            # startup using these values. With Longhorn provisioning a fresh PVC,
            # the default 1000:1000 is fine — no pre-existing ownership to match.
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: backups
              mountPath: /backups
          # Native health endpoint added in NeutArr (not present in upstream Huntarr).
          # /api/health returns 200 when the app is ready to serve requests.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9705
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9705
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: config
          persistentVolumeClaim:
            # Longhorn-backed, NeutArr-specific config storage.
            # Defined in apps/arr-stack/neutarr/persistentvolumeclaim-neutarr-config.yaml
            claimName: neutarr-config
        - name: backups
          persistentVolumeClaim:
            # NFS-backed, dynamically provisioned via nfs-backups StorageClass.
            # Data stored at /mnt/user/Backups/arr-stack/neutarr-backups/ on Unraid.
            # Defined in apps/arr-stack/neutarr/persistentvolumeclaim-neutarr-backups.yaml
            claimName: neutarr-backups