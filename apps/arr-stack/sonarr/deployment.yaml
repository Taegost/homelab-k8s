# Deployment — Sonarr
#
# Sonarr is an automated TV series collection manager that monitors RSS feeds,
# grabs releases, and manages your TV library.
# GitHub: https://github.com/Sonarr/Sonarr
#
# Volumes:
#   /config     — Longhorn PVC (sonarr-config): app configuration, series
#                 database, quality profiles, indexer settings.
#   /multimedia — Inline NFS CSI volume: mounts the Multimedia share root
#                 on Unraid directly without a PV or PVC, for moving and
#                 renaming downloaded episode files.
#   /backups    — NFS PVC (sonarr-backups): dynamically provisioned on the
#                 Unraid Backups share via nfs-backups StorageClass. Data lives
#                 at /mnt/user/Backups/arr-stack/sonarr-backups/ on Unraid.
#
# Resources based on observed peak under full load (all series searching
# simultaneously): 907MB RAM peak, 163% CPU peak with two plateaus at ~30%
# and ~75%. 1Gi RAM and 2000m CPU give comfortable headroom above those peaks.
#
# Image versioning: pinned to a specific tag for reproducible deployments.
# To upgrade: update the image tag below and push — ArgoCD applies the change.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: arr-stack
  labels:
    app: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.16.2944-ls303
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - NET_RAW
          ports:
            - containerPort: 8989
              name: http
          resources:
            requests:
              cpu: "200m"
              memory: "300Mi"
            limits:
              cpu: "2000m"
              memory: "1.2Gi"
          env:
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "000"
            - name: TZ
              value: "America/New_York"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: multimedia
              mountPath: /multimedia
            - name: backups
              mountPath: /backups
          readinessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: multimedia
          csi:
            driver: nfs.csi.k8s.io
            volumeAttributes:
              server: firebird.lan.
              share: /mnt/user/Multimedia
              mountOptions: "nfsvers=3,nolock"
        - name: backups
          persistentVolumeClaim:
            claimName: sonarr-backups
