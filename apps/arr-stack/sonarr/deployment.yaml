# Deployment — Sonarr
#
# Sonarr is an automated TV series collection manager that monitors RSS feeds,
# grabs releases, and manages your TV library.
# GitHub: https://github.com/Sonarr/Sonarr
#
# Volumes:
#   /config     — Longhorn PVC (sonarr-config): app configuration, series
#                 database, quality profiles, indexer settings.
#   /multimedia — Shared NFS PVC (multimedia): all four arr-stack media apps
#                 mount this single RWX PVC simultaneously. It binds to the
#                 static PV arr-stack-multimedia which points directly at the
#                 Multimedia share root — Sonarr uses it to move and rename
#                 downloaded episode files into the library.
#   /backups    — NFS PVC (sonarr-backups): dynamically provisioned on the
#                 Unraid Backups share via nfs-backups StorageClass. Data lives
#                 at /mnt/user/Backups/arr-stack/sonarr-backups/ on Unraid.
#
# Memory limit: 4Gi to match the resource ceiling from the legacy Docker
# Compose deployment — Sonarr's SQLite database operations are memory-hungry
# on large TV libraries.
#
# Image versioning: pinned to a specific tag for reproducible deployments.
# To upgrade: update the image tag below and push — ArgoCD applies the change.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: arr-stack
  labels:
    app: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.17
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - NET_RAW
          ports:
            - containerPort: 8989
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "4Gi"
          env:
            - name: PUID
              value: "99"
            - name: PGID
              value: "100"
            - name: UMASK
              value: "000"
            - name: TZ
              value: "America/New_York"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: multimedia
              mountPath: /multimedia
            - name: backups
              mountPath: /backups
          readinessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-config
        - name: multimedia
          persistentVolumeClaim:
            claimName: multimedia
        - name: backups
          persistentVolumeClaim:
            claimName: sonarr-backups
