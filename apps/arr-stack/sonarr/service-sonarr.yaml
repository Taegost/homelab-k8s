# Service — sonarr
#
# ClusterIP service exposing Sonarr's web UI and API port within the cluster.
# Traefik routes external traffic here via the IngressRoute in the traefik
# namespace. Prowlarr and Bazarr reach Sonarr directly at
# sonarr.arr-stack.svc.cluster.local:8989.
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: arr-stack
spec:
  selector:
    app: sonarr
  ports:
    - name: http
      port: 8989
      targetPort: 8989
  type: ClusterIP
