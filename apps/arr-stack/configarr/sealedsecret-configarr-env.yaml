# API keys can be found in each app's Settings → General → API Key.
# DRY_RUN: can be set to "true" to test config changes without pushing to arr instances.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: configarr-env
  namespace: arr-stack
spec:
  encryptedData:
    DRY_RUN: 
    RADARR_API_KEY: 
    SONARR_API_KEY: 
  template:
    metadata:
      name: configarr-env
      namespace: arr-stack
    type: Opaque
