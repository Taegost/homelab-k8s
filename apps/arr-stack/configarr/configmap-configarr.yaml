# ConfigMap — configarr
#
# Contains Configarr's config.yml, which defines which TRaSH-Guides custom
# format definitions to sync into Sonarr and Radarr.
#
# API keys are NOT stored here. They are injected at runtime from
# sealedsecret-configarr-env via the !env tag in config.yml
# (e.g. api_key: !env SONARR_API_KEY).
#
# IMPORTANT: Configarr reads this file at job startup. After editing this
# ConfigMap, trigger a manual CronJob run or wait for the next scheduled run
# (every 12 hours) for changes to take effect. ArgoCD syncing this ConfigMap
# does NOT restart the CronJob automatically — you must run it manually:
#
#   kubectl create job -n arr-stack configarr-manual \
#     --from=cronjob/configarr
#
# Format selection notes:
#   - quality_profiles: [] means formats are synced into the arr instance but
#     no profile score assignments are made — scoring remains managed manually
#   - Scene is intentionally excluded from Sonarr Unwanted (present in Radarr)
#   - Radarr does not have the Sonarr-specific HD/UHD Boost, Season Pack, or
#     Language Profile formats — those are Sonarr-only TRaSH IDs
apiVersion: v1
kind: ConfigMap
metadata:
  name: configarr
  namespace: arr-stack
data:
  config.yml: |
    trashGuideUrl: https://github.com/TRaSH-Guides/Guides

    # Short DNS names (e.g. "sonarr" rather than "sonarr.arr-stack.svc.cluster.local")
    # work here because Configarr runs in the same arr-stack namespace as these
    # services. CoreDNS expands them automatically. Full FQDNs are only needed
    # when crossing namespace boundaries.
    sonarr:
      main:
        base_url: http://sonarr:8989
        api_key: !env SONARR_API_KEY
        custom_formats:
          - trash_ids:
