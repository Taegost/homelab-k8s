# IngressRoute — whisparr (in traefik namespace)
#
# Lives in the `traefik` namespace because it references the wildcard TLS
# secret, which cannot be shared across namespaces.
#
# Authentik SSO is not wired in yet — will be added during the Authentik
# migration. At that point this becomes two routes: /api/ with `secured`
# only (so Prowlarr/download clients can reach the API without SSO), and
# / with `secured` + `authentik` for the UI.
#
# Backend service: whisparr.arr-stack.svc.cluster.local:6969
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whisparr
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whisparr.home.diceninjagaming.com`) && PathPrefix(`/api/`)
      kind: Rule
      middlewares:
        - name: secured
          namespace: traefik
      services:
        - name: whisparr
          namespace: arr-stack
          port: 6969
    - match: Host(`whisparr.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: secured
          namespace: traefik
      services:
        - name: whisparr
          namespace: arr-stack
          port: 6969
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
