# IngressRoute — whisparr (in traefik namespace)
#
# Lives in the `traefik` namespace because it references the wildcard TLS
# secret, which cannot be shared across namespaces.
#
# Two routes on the same host:
#   /api/ — secured only (no Authentik). Allows Prowlarr, download clients,
#            and external tooling to call the Whisparr API without SSO.
#            Restricted to internal subnets via the internal-whitelist in
#            the `secured` middleware chain.
#   /     — secured + authentik for full SSO protection on the UI.
#
# Backend service: whisparr.arr-stack.svc.cluster.local:6969
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: whisparr
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`whisparr.home.diceninjagaming.com`) && PathPrefix(`/api/`)
      kind: Rule
      middlewares:
        - name: secured
          namespace: traefik
      services:
        - name: whisparr
          namespace: arr-stack
          port: 6969
    - match: Host(`whisparr.home.diceninjagaming.com`)
      kind: Rule
      middlewares:
        - name: secured
          namespace: traefik
      services:
        - name: whisparr
          namespace: arr-stack
          port: 6969
  tls:
    secretName: wildcard-home-diceninjagaming-com-tls
