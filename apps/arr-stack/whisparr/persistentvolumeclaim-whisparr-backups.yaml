# PersistentVolumeClaim — whisparr-backups
#
# SMB-backed backup storage for Whisparr, dynamically provisioned by the
# smb-backups StorageClass.
#
# On Unraid, data is stored at:
#   /mnt/user/Backups/arr-stack/whisparr-backups/
#
# reclaimPolicy is Retain (set on the StorageClass) — deleting this PVC
# does NOT delete the backup data on Unraid.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisparr-backups
  namespace: arr-stack
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: smb-backups
  resources:
    requests:
      storage: 10Gi
