# App-namespace secrets for the Firefly III data importer.
#
# FIREFLY_III_ACCESS_TOKEN: create at Firefly III profile → OAuth → Personal Access Tokens
# SIMPLEFIN_TOKEN: from your SimpleFIN subscription
# AUTO_IMPORT_SECRET: must be at least 16 characters; used to authenticate cron-triggered imports
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: firefly3-importer
  namespace: firefly3
spec:
  encryptedData:
    AUTO_IMPORT_SECRET: 
    FIREFLY_III_ACCESS_TOKEN: 
    SIMPLEFIN_TOKEN: 
  template:
    metadata:
      name: firefly3-importer
      namespace: firefly3
    type: Opaque
