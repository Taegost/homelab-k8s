# IMPORTANT: The password set here must be identical to the database-password key in
# secret-firefly3.yaml (firefly3 namespace). Both secrets carry the same credential but
# serve different consumers in different namespaces:
#   - This secret (postgres ns): CNPG uses it to set the PostgreSQL role password
#   - secret-firefly3.yaml (firefly3 ns): the app pod reads POSTGRES_PASSWORD from there
# Kubernetes pods cannot reference secrets across namespaces, so the value must appear in both.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: firefly3-db-credentials
  namespace: postgres
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      labels:
        cnpg.io/reload: "true"
      name: firefly3-db-credentials
      namespace: postgres
    type: kubernetes.io/basic-auth
