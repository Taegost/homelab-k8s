# App-namespace secrets for Firefly III core.
#
# DB_PASSWORD must be identical to the password key in
# sealedsecret-firefly3-db-credentials.yaml (postgres namespace).
# Both carry the same credential — the postgres-namespace secret lets CNPG
# manage the role password; this one lets the app pod connect.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: firefly3
  namespace: firefly3
spec:
  encryptedData:
    APP_KEY: 
    DB_PASSWORD: 
    STATIC_CRON_TOKEN: 
  template:
    metadata:
      name: firefly3
      namespace: firefly3
    type: Opaque
