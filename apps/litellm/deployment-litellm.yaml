apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # Keep all running pods healthy during rollout — briefly allows 3 pods
      # while new one starts before old one is taken down. Critical service;
      # zero unavailability during upgrades is worth the temporary extra pod.
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          # Prefer spreading replicas across nodes but don't hard-require it —
          # a hard requirement would leave one pod Pending if a node is lost,
          # which defeats the purpose of HA on a 2-node cluster.
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: litellm
                topologyKey: kubernetes.io/hostname
      containers:
        - name: litellm
          # non_root variant runs as saasapi (UID 1000) — no root-drop at runtime,
          # no capabilities required. Port 4000 is non-privileged.
          image: ghcr.io/berriai/litellm-non_root:main-v1.83.10-stable
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
          ports:
            - containerPort: 4000
          env:
            # Full connection string including password. Uses postgres-rw (direct,
            # bypasses PgBouncer) because Prisma takes advisory locks during
            # schema migrations on startup — incompatible with transaction pooling.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm
                  key: database-url
            # Master key for the LiteLLM UI and API admin operations.
            # Referenced from config.yaml via os.environ/LITELLM_MASTER_KEY.
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm
                  key: master-key
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm
                  key: nvidia-api-key
            # Mitigates a known long-running memory leak — LiteLLM memory grows
            # continuously over days without levelling off. Recycling workers
            # periodically keeps RSS bounded without requiring a full pod restart.
            - name: MAX_REQUESTS_BEFORE_RESTART
              value: "1000"

            # ── Authentik SSO (Generic OIDC) ─────────────────────────────────
            # Client credentials from the Authentik OAuth2/OIDC application.
            - name: GENERIC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: litellm
                  key: sso-client-id
            - name: GENERIC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: litellm
                  key: sso-client-secret
            # Canonical Authentik coordinates. All SSO endpoint URLs below are
            # constructed from these two values via Kubernetes variable substitution
            # ($(VAR_NAME) syntax) — update here and all downstream vars follow.
            # AUTHENTIK_APP_SLUG must match the application slug in Authentik
            # (Applications → your LiteLLM app → Slug field).
            - name: AUTHENTIK_HOST
              value: "https://authentik.diceninjagaming.com"
            - name: AUTHENTIK_APP_SLUG
              value: "litellm"
            # Standard Authentik OIDC endpoints — same for every provider on
            # this Authentik instance regardless of application slug.
            - name: GENERIC_AUTHORIZATION_ENDPOINT
              value: "$(AUTHENTIK_HOST)/application/o/authorize/"
            - name: GENERIC_TOKEN_ENDPOINT
              value: "$(AUTHENTIK_HOST)/application/o/token/"
            - name: GENERIC_USERINFO_ENDPOINT
              value: "$(AUTHENTIK_HOST)/application/o/userinfo/"
            # litellm_role is a custom Scope Mapping created in Authentik
            # (Customization → Property Mappings → Scope Mapping). The mapping
            # expression returns {"litellm_role": "proxy_admin"} for admins and
            # {"litellm_role": "internal_user"} for normal users. That custom
            # scope must also be added to the LiteLLM OIDC provider in Authentik.
            - name: GENERIC_SCOPE
              value: "openid profile email litellm_role"
            # Tells LiteLLM which field in the userinfo response holds the role.
            # Must match the key returned by the Authentik scope mapping above.
            - name: GENERIC_USER_ROLE_ATTRIBUTE
              value: "litellm_role"
            # Base URL used to construct the SSO callback URI:
            # https://litellm.diceninjagaming.com/sso/callback
            # Must be registered as an allowed redirect URI in the Authentik app.
            - name: PROXY_BASE_URL
              value: "https://litellm.diceninjagaming.com"
            # Redirect to Authentik's end-session endpoint on logout so the
            # Authentik session is also cleared.
            - name: PROXY_LOGOUT_URL
              value: "$(AUTHENTIK_HOST)/application/o/$(AUTHENTIK_APP_SLUG)/end-session/"
            # Skip the LiteLLM login form and go directly to Authentik.
            # Fallback credentials below remain accessible at /fallback/login.
            - name: AUTO_REDIRECT_UI_LOGIN_TO_SSO
              value: "true"

            # ── Fallback UI credentials ───────────────────────────────────────
            # Emergency access if Authentik is unavailable. Accessible at
            # /fallback/login — not shown on the normal login page.
            - name: UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: litellm
                  key: ui-username
            - name: UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm
                  key: ui-password

          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          startupProbe:
            httpGet:
              # /health/readiness checks DB connectivity and full initialization —
              # startup is not declared complete until the database is reachable
              # and migrations have finished. LiteLLM holds port 4000 closed
              # until this point, so early probes get "connection refused"; that
              # is expected and counts against the failureThreshold budget.
              # Budget: 30 × 10s = 300s. Matches the LiteLLM Helm chart defaults.
              # Kubernetes gates liveness and readiness probes on startupProbe
              # completion, so no initialDelaySeconds is needed on those probes.
              path: /health/readiness
              port: 4000
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              # LiteLLM production docs set 1500Mi as the minimum safe request —
              # below 512Mi is documented to cause OOMKilled on startup.
              memory: 1500Mi
            limits:
              cpu: 2000m
              # 4Gi per the LiteLLM production docs baseline. LiteLLM has a known
              # long-running memory leak (grows continuously over days); mitigated
              # by MAX_REQUESTS_BEFORE_RESTART below rather than by a tighter limit.
              memory: 4Gi
      volumes:
        - name: config
          configMap:
            name: litellm-config
