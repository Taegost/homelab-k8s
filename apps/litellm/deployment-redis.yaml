apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: litellm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:8.6.2-alpine
          # --save "": disables RDB snapshots — all LiteLLM state (rate limits,
          # health checks, spend counters) is ephemeral by design; durable state
          # lives in Postgres. Disabling persistence avoids write errors when
          # running non-root without a writable /data volume.
          # --loglevel warning: reduces noise in logs.
          args: ["--save", "", "--loglevel", "warning"]
          ports:
            - containerPort: 6379
          securityContext:
            # redis:*-alpine entrypoint checks id -u; if not root it skips the
            # gosu drop and runs redis directly. Setting runAsUser: 999 (the
            # redis user baked into the image) avoids any root→drop dance.
            runAsUser: 999
            runAsGroup: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
