# App-level secrets for LiteLLM — lives in the litellm namespace.
#
# Before sealing, fill in ALL placeholder values:
#   - database-url  : use the SAME password as litellm-db-credentials in the
#                     postgres namespace (Kubernetes pods cannot reference secrets
#                     across namespaces, so the password must appear in both)
#   - master-key    : your chosen admin key — MUST start with "sk-"
#   - nvidia-api-key: from build.nvidia.com → API Keys
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: litellm
  namespace: litellm
spec:
  encryptedData:
    # Full Postgres connection string. Replace YOUR_DB_PASSWORD_HERE with the same
    # value used in apps/litellm/secret-litellm-db-credentials.yaml.
    # Using postgres-rw (direct connection) — LiteLLM's Prisma ORM takes advisory
    # locks during schema migrations on startup, which are incompatible with the
    # PgBouncer pooler in transaction mode.
    database-url: 
    # Admin key for the LiteLLM UI and API. Must start with "sk-".
    master-key: 
    nvidia-api-key: 
  template:
    metadata:
      name: litellm
      namespace: litellm
    type: Opaque
