# Postgres role credentials for the litellm database.
# Fill in a strong password, then seal:
#   kubeseal --format yaml < apps/litellm/secret-litellm-db-credentials.yaml > apps/litellm/sealedsecret-litellm-db-credentials.yaml
#   rm apps/litellm/secret-litellm-db-credentials.yaml
#
# IMPORTANT: use the same password value in secret-litellm.yaml (key: database-password)
# in the litellm namespace — Kubernetes pods cannot reference secrets across namespaces.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: litellm-db-credentials
  namespace: postgres
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      labels:
        # Tells CNPG to re-reconcile the managed role if the secret wasn't present
        # at initial sync time (race condition between SealedSecret decryption and
        # CNPG's first reconciliation attempt).
        cnpg.io/reload: "true"
      name: litellm-db-credentials
      namespace: postgres
    type: kubernetes.io/basic-auth
