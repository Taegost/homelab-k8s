# SealedSecret -- honcho (honcho namespace)
#
# This is a PLACEHOLDER. Replace with the output of:
#   kubeseal --format yaml < apps/honcho/secret-honcho.yaml > apps/honcho/sealedsecret-honcho.yaml
#
# The sync-wave annotation must be in BOTH metadata.annotations AND
# spec.template.metadata.annotations for ArgoCD to decrypt at the right wave.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: honcho
  namespace: honcho
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    database-url: REPLACE_WITH_KUBESEALED_VALUE
    jwt-secret: REPLACE_WITH_KUBESEALED_VALUE
    llm-api-key: REPLACE_WITH_KUBESEALED_VALUE
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: honcho
      namespace: honcho
    type: Opaque
