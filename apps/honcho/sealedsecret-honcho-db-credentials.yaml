# SealedSecret -- honcho-db-credentials (postgres namespace)
#
# This is a PLACEHOLDER. Replace with the output of:
#   kubeseal --format yaml < apps/honcho/secret-honcho-db-credentials.yaml > apps/honcho/sealedsecret-honcho-db-credentials.yaml
#
# The sync-wave annotation must be in BOTH metadata.annotations AND
# spec.template.metadata.annotations for CNPG to decrypt before reconciling.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: honcho-db-credentials
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  encryptedData:
    password: REPLACE_WITH_KUBESEALED_VALUE
    username: REPLACE_WITH_KUBESEALED_VALUE
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-3"
      labels:
        cnpg.io/reload: "true"
      name: honcho-db-credentials
      namespace: postgres
    type: kubernetes.io/basic-auth
