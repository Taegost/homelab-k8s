# Secret — wordpress-dng
#
# Duplicates database credentials for the WordPress site.
# Deployed to the wordpress-dng namespace.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-dng
  namespace: wordpress-dng
  annotations:
    # Wave -1: Secret must exist before the Deployment (wave 0) starts.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    WORDPRESS_DB_PASSWORD: 
    WORDPRESS_DB_USER: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      labels:
        app.kubernetes.io/name: wordpress-dng
      name: wordpress-dng
      namespace: wordpress-dng
    type: Opaque
