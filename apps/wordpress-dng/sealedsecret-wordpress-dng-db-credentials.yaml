# Secret — wordpress-dng-db-credentials
#
# Database credentials for the WordPress site.
# Deployed to the mariadb namespace.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-dng-db-credentials
  namespace: mariadb
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-3"
      labels:
        app.kubernetes.io/name: wordpress-dng
      name: wordpress-dng-db-credentials
      namespace: mariadb
    type: Opaque
