---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: wordpress-dng-keys
  namespace: wordpress-dng
  annotations:
    # Wave -1: Secret must exist before the Deployment (wave 0) starts.
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    WORDPRESS_AUTH_KEY: 
    WORDPRESS_AUTH_SALT: 
    WORDPRESS_LOGGED_IN_KEY: 
    WORDPRESS_LOGGED_IN_SALT: 
    WORDPRESS_NONCE_KEY: 
    WORDPRESS_NONCE_SALT: 
    WORDPRESS_SECURE_AUTH_KEY: 
    WORDPRESS_SECURE_AUTH_SALT: 
  template:
    metadata:
      name: wordpress-dng-keys
      namespace: wordpress-dng
