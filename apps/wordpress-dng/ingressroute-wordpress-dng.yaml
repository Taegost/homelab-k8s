# IngressRoute — wordpress-dng
#
# Routes traffic for diceninjagaming.com to the WordPress service.
# Uses a dedicated certificate for the root domain.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: wordpress-dng
  namespace: wordpress-dng
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`diceninjagaming.com`)
      kind: Rule
      services:
        - name: wordpress-dng
          port: 80
      middlewares:
        - name: default-headers
          namespace: traefik
