# Service — wordpress-dng
#
# Exposes the WordPress deployment internally on port 80.
apiVersion: v1
kind: Service
metadata:
  name: wordpress-dng
  namespace: wordpress-dng
  labels:
    app.kubernetes.io/name: wordpress-dng
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app.kubernetes.io/name: wordpress-dng
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP