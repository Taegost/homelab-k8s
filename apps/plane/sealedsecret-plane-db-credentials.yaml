# CNPG-managed database credentials — Plane
#
# This secret lives in the postgres namespace so CNPG can set the role password.
# The password must also appear in secret-plane.yaml (plane namespace) for the
# app pod to read. Keep both values identical when rotating.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: plane-db-credentials
  namespace: postgres
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-3"
      labels:
        cnpg.io/reload: "true"
      name: plane-db-credentials
      namespace: postgres
    type: kubernetes.io/basic-auth
