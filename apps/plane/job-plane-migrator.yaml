# Job — Plane Migrator (database migrations)
#
# Runs Django database migrations once. Must complete before the API pod
# can serve traffic — the API's startup probe will block until migrations
# are applied and the health endpoint responds.
#
# Same image as API, different entrypoint.
# restartPolicy: OnFailure — retries if the database isn't ready yet.
apiVersion: batch/v1
kind: Job
metadata:
  name: plane-migrator
  namespace: plane
  labels:
    app.kubernetes.io/part-of: plane
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: plane
    spec:
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrator
          image: docker.io/makeplane/plane-backend:v1.3.1
          command: ["./bin/docker-entrypoint-migrator.sh"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: plane
            - secretRef:
                name: plane
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plane
                  key: database-password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: plane
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: plane
                  key: aws-secret-access-key
            - name: LIVE_SERVER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plane
                  key: live-server-secret-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plane
                  key: rabbitmq-password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
