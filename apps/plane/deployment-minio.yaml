# Deployment — MinIO (S3-compatible object storage)
#
# Plane uses MinIO for file uploads via S3 presigned URLs. The frontend
# uploads directly to MinIO — not through the Django API. This matches
# Plane's docker-compose architecture.
#
# Image: Chainguard MinIO, pinned by digest. MinIO stopped publishing free
# Docker images Oct 2025 — both docker.io and quay.io are dead. Chainguard
# provides the free replacement. Free tier only publishes :latest — pinning
# by digest instead.
#
# Mounts a Longhorn RWO PVC at /export (the MinIO data directory).
# Recreate strategy required — RWO cannot attach to two pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: plane
  labels:
    app.kubernetes.io/part-of: plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        app.kubernetes.io/part-of: plane
    spec:
      automountServiceAccountToken: false
      securityContext:
        # Chainguard MinIO image runs as non-root UID/GID 65532.
        # fsGroup is required — Longhorn volumes are root-owned until kubelet
        # chowns them to the pod's fsGroup before the container starts.
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: cgr.dev/chainguard/minio@sha256:aee323dfedc990c9856d1098ffa2afa5e480e8bbc6be6e3aec6c21328fd3258d
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          args:
            - server
            - /export
            - --console-address
            - ":9090"
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9090
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: s3-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: s3-root-password
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /export
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
