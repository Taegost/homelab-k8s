# Deployment — MinIO (S3-compatible object storage)
#
# Plane uses MinIO for file uploads via S3 presigned URLs. The frontend
# uploads directly to MinIO — not through the Django API. This matches
# Plane's docker-compose architecture.
#
# Image pinned to RELEASE.2025-10-15T17-29-55Z — docker.io/minio/minio is
# stale (repo archived Apr 2026); quay.io/minio/minio is the current source.
#
# Mounts a Longhorn RWO PVC at /export (the MinIO data directory).
# Recreate strategy required — RWO cannot attach to two pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: plane
  labels:
    app.kubernetes.io/part-of: plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        app.kubernetes.io/part-of: plane
    spec:
      automountServiceAccountToken: false
      securityContext:
        # MinIO image (ubi9/ubi-micro base, no USER directive) runs as root.
        # Root can write to root-owned Longhorn volumes — no fsGroup needed.
        # fsGroup exists to help NON-root containers write to root-owned PVCs.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2025-10-15T17-29-55Z
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          args:
            - server
            - /export
            - --console-address
            - ":9090"
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9090
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: s3-root-user
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: s3-root-password
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /export
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
