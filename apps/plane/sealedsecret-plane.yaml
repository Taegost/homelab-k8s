# Plane application secrets
#
# Contains credentials the Plane API and workers need at runtime.
# The database password must match the value in secret-plane-db-credentials.yaml
# (postgres namespace) — keep them identical when rotating.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: plane
  namespace: plane
spec:
  encryptedData:
    database-password: 
    live-server-secret-key: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: plane
      namespace: plane
    type: Opaque
