# Deployment — RabbitMQ (Celery message broker)
#
# Plane uses RabbitMQ as the Celery broker. Redis/Valkey is used only for
# caching/sessions; Plane's env var schema separates RABBITMQ_* from REDIS_*
# and its docker-compose.yml explicitly deploys RabbitMQ.
#
# Management plugin enabled on port 15672 for debugging — internal-only,
# not exposed via IngressRoute.
#
# Single replica with Recreate strategy — Longhorn RWO cannot attach to
# two pods simultaneously.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: plane
  labels:
    app.kubernetes.io/part-of: plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
        app.kubernetes.io/part-of: plane
    spec:
      automountServiceAccountToken: false
      securityContext:
        # RabbitMQ alpine entrypoint runs as root, chowns /var/lib/rabbitmq
        # to rabbitmq:rabbitmq, then drops to rabbitmq. NO fsGroup — it sets
        # g+rwx+setgid on the volume, causing .erlang.cookie to inherit group
        # permissions. RabbitMQ requires 0600 (owner only). Init container
        # handles lost+found removal and volume ownership.
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # lost+found is created by ext4 mkfs at the volume root, owned root:root
        # with mode 0700. RabbitMQ's startup scripts run 'find' as the rabbitmq
        # user, which can't traverse it unless fsGroup chowns it. Remove it to
        # avoid the issue entirely — it serves no purpose in a container.
        - name: fix-data-permissions
          image: docker.io/library/busybox:1.36
          command:
            - sh
            - -c
            - |
              rm -rf /var/lib/rabbitmq/lost+found
              chown -R 100:101 /var/lib/rabbitmq
              # Fix leftover cookie with wrong perms from prior fsGroup runs
              if [ -f /var/lib/rabbitmq/.erlang.cookie ]; then
                chmod 0600 /var/lib/rabbitmq/.erlang.cookie
                chown 100:101 /var/lib/rabbitmq/.erlang.cookie
              fi
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      containers:
        - name: rabbitmq
          image: docker.io/library/rabbitmq:3.13.6-management-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                # RabbitMQ entrypoint: (1) chowns /var/lib/rabbitmq to rabbitmq
                # (needs CAP_CHOWN), then (2) uses su-exec to drop to rabbitmq user
                # (needs CAP_SETGID + CAP_SETUID for setgroups()).
                # (3) DAC_OVERRIDE: probe commands run as root but .erlang.cookie
                # is mode 0600 owned by rabbitmq:rabbitmq. Without DAC_OVERRIDE,
                # root without capabilities respects file permissions and cannot
                # read the cookie — so rabbitmq-diagnostics always fails.
                - CHOWN
                - DAC_OVERRIDE
                - SETGID
                - SETUID
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: password
            - name: RABBITMQ_DEFAULT_VHOST
              value: plane
          # RabbitMQ can take 2+ minutes to initialize under memory
          # pressure. Startup probe gates liveness/readiness — neither fires
          # until it succeeds. failureThreshold 20 × periodSeconds 10 = 200s
          # max startup time (observed: 155s).
          startupProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_running"]
            failureThreshold: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_running"]
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_port_connectivity"]
            periodSeconds: 10
          # RabbitMQ needs sufficient memory headroom. vm_memory_high_watermark
          # is set to 500MB absolute via configmap-rabbitmq.yaml — the container
          # limit must exceed that by enough for Erlang VM overhead (~200Mi).
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/conf.d/99-memory.conf
              subPath: 99-memory.conf
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rabbitmq-data
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
