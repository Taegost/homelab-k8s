# Deployment — RabbitMQ (Celery message broker)
#
# Plane uses RabbitMQ as the Celery broker. Redis/Valkey is used only for
# caching/sessions; Plane's env var schema separates RABBITMQ_* from REDIS_*
# and its docker-compose.yml explicitly deploys RabbitMQ.
#
# Management plugin enabled on port 15672 for debugging — internal-only,
# not exposed via IngressRoute.
#
# Single replica with Recreate strategy — Longhorn RWO cannot attach to
# two pods simultaneously.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: plane
  labels:
    app.kubernetes.io/part-of: plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
        app.kubernetes.io/part-of: plane
    spec:
      automountServiceAccountToken: false
      securityContext:
        # RabbitMQ alpine image runs as root (no USER directive). Root can
        # write to root-owned Longhorn volumes — no fsGroup needed. The
        # entrypoint chowns /var/lib/rabbitmq to rabbitmq:rabbitmq at startup.
        # fsGroup exists to help NON-root containers write to root-owned PVCs.
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rabbitmq
          image: docker.io/library/rabbitmq:3.13.6-management-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: password
            - name: RABBITMQ_DEFAULT_VHOST
              value: plane
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_running"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_running"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rabbitmq-data
