# MinIO root credentials — Plane
#
# Single source of truth for MinIO/S3 credentials. Both the MinIO container
# and the Plane API consume this secret — each maps the keys to the env var
# names they expect:
#
#   MinIO container:  s3-root-user → MINIO_ROOT_USER, s3-root-password → MINIO_ROOT_PASSWORD
#   Plane API:        s3-root-user → AWS_ACCESS_KEY_ID, s3-root-password → AWS_SECRET_ACCESS_KEY
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: minio
  namespace: plane
spec:
  encryptedData:
    s3-root-password: 
    s3-root-user: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: minio
      namespace: plane
    type: Opaque
