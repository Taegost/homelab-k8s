# Deployment — Plane Worker (Celery background tasks)
#
# Processes async tasks: notifications, exports, file cleanup.
# Same image as API, different entrypoint.
#
# No port — workers pull tasks from RabbitMQ. Liveness probe uses
# celery inspect to verify the worker is responsive.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-worker
  namespace: plane
  labels:
    app.kubernetes.io/part-of: plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plane-worker
  template:
    metadata:
      labels:
        app: plane-worker
        app.kubernetes.io/part-of: plane
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: docker.io/makeplane/plane-backend:v1.3.1
          command: ["./bin/docker-entrypoint-worker.sh"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: plane
            - secretRef:
                name: plane
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plane
                  key: live-server-secret-key
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plane
                  key: database-password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: s3-root-user
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio
                  key: s3-root-password
            - name: LIVE_SERVER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plane
                  key: live-server-secret-key
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq
                  key: password
          # exec arrays don't expand $HOSTNAME — use shell to interpolate.
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - celery -A plane inspect ping -d celery@$HOSTNAME
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
