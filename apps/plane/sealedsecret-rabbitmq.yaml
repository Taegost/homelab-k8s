# RabbitMQ credentials — Plane
#
# Plane's docker-compose uses user=plane, vhost=plane.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: rabbitmq
  namespace: plane
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      name: rabbitmq
      namespace: plane
    type: Opaque
