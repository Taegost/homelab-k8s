# Deployment — Plane Space (public project views)
#
# Serves public project pages at /spaces/*.
# Dockerfile.space: node:22-alpine, CMD: npx react-router-serve.
#
# EXPOSE 3000. node:22-alpine image runs as UID 1000 (node user).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plane-space
  namespace: plane
  labels:
    app.kubernetes.io/part-of: plane
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plane-space
  template:
    metadata:
      labels:
        app: plane-space
        app.kubernetes.io/part-of: plane
    spec:
      automountServiceAccountToken: false
      securityContext:
        # node:22-alpine runs as node user (UID 1000)
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: space
          image: docker.io/makeplane/plane-space:v1.3.1
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: http
          # Router basename is /spaces/ — / returns 404, which Kubernetes
          # treats as probe failure (>= 400). Probe must match the basename.
          # timeoutSeconds: 10 — the space server calls the API backend to
          # render pages. If the API is slow or down, responses can take
          # 5-10s. Default 1s timeout → spurious probe failures.
          livenessProbe:
            httpGet:
              path: /spaces/
              port: 3000
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /spaces/
              port: 3000
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
