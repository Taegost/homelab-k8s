# App of Apps — Root Application
#
# This is the single entry point that connects ArgoCD to this repository.
# It is applied once during bootstrap (Step 6 of bootstrap/README.md) and
# is intentionally NOT managed by ArgoCD itself — it is a bootstrap artifact,
# similar to kube-vip.
#
# ── What it does ─────────────────────────────────────────────────────────────
# Points at apps/manifests/ which contains one Application manifest per
# component. ArgoCD creates each child Application, which then manages its
# own directory under apps/<name>/ independently.
#
# Adding a new application:
#   1. Create apps/<app-name>/ with your manifests and an argocd-app.yaml
#   2. Copy apps/<app-name>/argocd-app.yaml to apps/manifests/<app-name>.yaml
#   3. Commit and push to main
#   4. ArgoCD discovers it automatically on next sync — no manual apply needed
#
# Removing an application:
#   1. Delete apps/manifests/<app-name>.yaml
#   2. Commit and push to main
#   3. ArgoCD prunes the Application and all resources it managed
#   4. Optionally delete the apps/<app-name>/ directory
#
# ── Why it lives at the repo root ────────────────────────────────────────────
# This file lives outside apps/ deliberately. It is not a child Application
# and does not need to manage itself — its only job is to bootstrap the
# discovery pattern. Keeping it at the root makes the entry point obvious to
# anyone reading the repo, and separates the "what starts everything" concern
# from the per-application configs under apps/.
#
# ── When to update this file ─────────────────────────────────────────────────
# This file rarely needs changing. You would update it if you:
#   - Rename or restructure the apps/manifests/ directory
#   - Change the target repository or branch
#
# ── How to update this file ──────────────────────────────────────────────────
# Since ArgoCD does not manage this file, changes must be applied manually:
#   1. Make your changes and commit to main
#   2. Apply the updated manifest:
#      kubectl apply -f app-of-apps.yaml
#   3. Verify ArgoCD reflects the change correctly in the UI
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Taegost/homelab-k8s
    targetRevision: HEAD
    path: apps/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true